<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Grupo Automec — Sistema de Gestão</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a227;--dark:#1a1a1a;--bg:#f0f2f5;--card:#fff;--border:#e0e0e0;
      --green:#1a5c1a;--red:#c0392b;--orange:#e65100;--text:#1a1a1a;--muted:#666}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
#s-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#111,#222);padding:2rem}
#s-main{display:none;flex-direction:column;min-height:100vh}
.lcard{background:#fff;border-radius:14px;padding:2rem;width:370px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.lcard input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:12px;font-family:inherit}
.lcard input:focus{outline:none;border-color:var(--gold)}
.abar{height:3px;background:linear-gradient(to right,#1a237e,#c0392b);border-radius:2px;margin-bottom:1.25rem}
nav{background:var(--dark);padding:.6rem 1.5rem;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.larea{flex:1;display:flex;align-items:center;gap:10px}
#bcrumb{background:#f8f8f8;border-bottom:1px solid #e0e0e0;padding:.45rem 1.5rem;display:none;font-size:12px;align-items:center;flex-wrap:wrap;gap:4px}
#mc{padding:1.5rem;flex:1}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1.5rem;max-width:900px;margin:2rem auto}
.hico{background:#fff;border:1px solid var(--border);border-radius:16px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hico:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:var(--gold)}
.hico.off{opacity:.4;pointer-events:none}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.mico{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.25rem 1rem;text-align:center;cursor:pointer;transition:all .2s}
.mico:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1);border-color:var(--gold)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ctit{font-size:14px;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.ctit::after{content:"";flex:1;height:2px;background:linear-gradient(to right,var(--gold),transparent)}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1rem}
.kpi{background:#f8f8f8;border-radius:8px;padding:.75rem 1rem;text-align:center;border:1px solid #ebebeb;transition:all .15s}
.kpi.clickable{cursor:pointer}.kpi.clickable:hover{border-color:var(--gold);background:#fffbf0;transform:translateY(-2px)}
.kpi.active{border-color:var(--gold);background:#fffbf0;box-shadow:0 0 0 2px var(--gold)}
.kpi .v{font-size:20px;font-weight:700}.kpi .l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.tw{overflow:auto;border:1px solid var(--border);border-radius:8px;max-height:55vh}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--gold);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;background:#fafafa;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tbody tr:hover{background:#fffbf0;cursor:pointer}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.bok{background:#e8f5e9;color:#1a5c1a}.bwarn{background:#fff3e0;color:#e65100}.bcrit{background:#ffebee;color:#c0392b}.binfo{background:#e3f2fd;color:#1565c0}.bgold{background:#fff8e1;color:#b8860b}
.ta{background:#e7f6ec;color:#0a7c5a;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
.tb{background:#eef4ff;color:#2d6cdf;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
.tc{background:#fff4dd;color:#9a6b00;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
.td,.tn{background:#fdeaea;color:#b13838;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
.btn{background:transparent;border:1px solid #ccc;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit}
.btn:hover{background:#f5f5f5}
.bgld{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:700}.bgld:hover{background:#b08f1f}
.bgrn{background:var(--green);color:#fff;border-color:var(--green)}
.bred{background:var(--red);color:#fff;border-color:var(--red)}
.bout{background:transparent;border:1px solid var(--gold);color:var(--gold)}.bout:hover{background:var(--gold);color:var(--dark)}
.bsm{padding:4px 10px;font-size:11px}.bxs{padding:2px 7px;font-size:10px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{margin-bottom:12px}
.fg label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--gold)}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem}
.fi{flex:1;min-width:110px}
.fi label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;font-weight:600}
.fi select,.fi input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;width:100%}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.mbox{background:#fff;border-radius:12px;padding:1.5rem;width:600px;max-width:97vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:10px;border-bottom:2px solid var(--gold)}
.mhdr h3{font-size:15px;font-weight:700}
.aok{background:#e8f5e9;color:#1a5c1a;border-left:3px solid #1a5c1a;padding:9px 14px;border-radius:6px;font-size:12px;margin-bottom:.75rem}
.awarn{background:#fff3e0;color:#e65100;border-left:3px solid #e65100;padding:9px 14px;border-radius:6px;font-size:12px;margin-bottom:.75rem}
.aerr{background:#ffebee;color:#c0392b;border-left:3px solid #c0392b;padding:9px 14px;border-radius:6px;font-size:12px;margin-bottom:.75rem}
.ainfo{background:#e3f2fd;color:#1565c0;border-left:3px solid #1565c0;padding:9px 14px;border-radius:6px;font-size:12px;margin-bottom:.75rem}
.hero{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;flex-direction:column;gap:12px;color:var(--muted)}
.spin{width:32px;height:32px;border:3px solid #eee;border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.drill-path{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;background:#fffbf0;border:1px solid var(--gold);padding:.5rem 1rem;border-radius:8px;font-size:12px}
.drill-path .crumb{cursor:pointer;color:var(--gold);font-weight:600}.drill-path .crumb:hover{text-decoration:underline}
.drill-path .sep{color:#ccc}.drill-path .cur{color:#333}
.div{height:1px;background:#eee;margin:1rem 0}
code{font-size:10px;background:#f0f0f0;padding:2px 5px;border-radius:3px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.chip{padding:4px 12px;border:1px solid #9fb3c8;border-radius:8px;background:linear-gradient(180deg,#fff,#f5f8fb);color:#324a5f;font-size:12px;font-weight:600;cursor:pointer}
.chip:hover{background:#e0eeff}.chip.active{background:linear-gradient(180deg,#d9ebff,#c7defa);border-color:#6d9ee8;color:#1b4f9c}
</style>
</head>
<body>

<div id="s-login">
  <div class="lcard">
    <div style="text-align:center;margin-bottom:1.25rem">
      <img id="logo-login" style="max-width:200px;max-height:75px;object-fit:contain"/>
      <p style="font-size:11px;color:#999;margin-top:8px;text-transform:uppercase;letter-spacing:2px">Sistema de Gestão</p>
    </div>
    <div class="abar"></div>
    <input id="lu" placeholder="Login" autocomplete="off"/>
    <input id="lp" type="password" placeholder="Senha" autocomplete="new-password"/>
    <button class="btn bgld" style="width:100%;padding:10px;font-size:14px" onclick="doLogin()">ENTRAR &#x2192;</button>
    <p id="lerr" style="color:#c0392b;font-size:11px;margin-top:8px;display:none;text-align:center"></p>
    <div style="margin-top:12px;padding:8px;background:#f8f8f8;border-radius:6px;font-size:11px;color:#aaa;text-align:center">
      v1.0.0 &nbsp;&middot;&nbsp; Grupo Automec
    </div>
    <div style="text-align:center;margin-top:10px"><img id="logo-acdelco" style="max-height:20px;opacity:.45;object-fit:contain"/></div>
  </div>
</div>
<div id="s-main">
  <nav>
    <div class="larea"><img id="logo-nav" style="max-height:36px;max-width:130px;object-fit:contain"/></div>
    <span style="flex:1"></span>
    <span id="nuser" style="font-size:11px;color:#888;margin-right:8px"></span>
    <button class="btn bsm bout" onclick="doLogout()">Sair</button>
  </nav>
  <div id="bcrumb" style="display:none"></div>
  <div id="mc" style="padding:1.5rem;flex:1"></div>
</div>
<div id="modal" style="display:none">
  <div class="mov" onclick="closeModal()">
    <div class="mbox" onclick="event.stopPropagation()">
      <div class="mhdr"><h3 id="mtit"></h3><button class="btn bsm" onclick="closeModal()">&#x2715;</button></div>
      <div id="mbody"></div>
    </div>
  </div>
</div>

var _cfgCache = {};
var _cfgOfiData = null;
var _cfgUniPolsData = null;
var _tecsCache = null;

async function _cfgGet(chave){
  if(_cfgCache[chave]!==undefined) return _cfgCache[chave];
  try{
    var {data,error}=await _supa.from('cfg_sistema').select('valor').eq('chave',chave).maybeSingle();
    if(error||!data) return null;
    _cfgCache[chave]=data.valor;
    return data.valor;
  }catch(e){return null;}
}

async function _cfgSet(chave,valor){
  _cfgCache[chave]=valor;
  try{
    await _supa.from('cfg_sistema').upsert({chave:chave,valor:valor},{onConflict:'chave'});
  }catch(e){console.error('_cfgSet:',e);}
}

async function _tecsLoad(){
  if(_tecsCache!==null) return _tecsCache;
  try{
    var {data,error}=await _supa.from('oficina_tecs').select('*').eq('excluido',false);
    if(error||!data){_tecsCache={};return {};}
    var map={};
    data.forEach(function(t){
      t.equipe_ali=t.equipe_alin||t.equipe_ali||'';
      map[t.nome]=t;
    });
    _tecsCache=map;
    return map;
  }catch(e){_tecsCache={};return {};}
}

async function _tecsSave(tecsMap){
  _tecsCache=tecsMap;
  var tecs=Object.values(tecsMap);
  if(!tecs.length) return;
  try{
    var rows=tecs.map(function(t){
      return{
        nome:       t.nome||'',
        cod_mec:    t.cod_mec||'',
        cod_alin:   t.cod_alin||'',
        cod_ac:     t.cod_ac||'',
        nome_alin:  t.nome_alin||'',
        nome_nps:   t.nome_nps||'',
        gestor:     t.gestor||'',
        matricula:  t.matricula||'',
        equipe_mec: t.equipe_mec||'',
        equipe_alin:t.equipe_alin||t.equipe_ali||'',
        equipe_ac:  t.equipe_ac||'',
        foto:       t.foto||'',
        revendas:   t.revendas||{},
        ativo:      t.ativo!==false,
        excluido:   false
      };
    });
    await _supa.from('oficina_tecs').upsert(rows,{onConflict:'nome'});
  }catch(e){console.error('_tecsSave:',e);}
}

async function _tecExcluir(nome,cod_mec){
  _tecsCache=null;
  try{
    await _supa.from('oficina_tecs').update({excluido:true}).eq('nome',nome);
    if(cod_mec) await _supa.from('oficina_tecs').update({excluido:true}).eq('cod_mec',cod_mec);

// Lista plana {key, label} para checkboxes — inclui módulos sem sub e cada submódulo
function _modulesFlatList(){
  var out=[];
  Object.keys(MODULES_TREE).forEach(function(modKey){
    var mod=MODULES_TREE[modKey];
    var subKeys=Object.keys(mod.sub||{});
    if(!subKeys.length){
      out.push({key:modKey, label:mod.icon+' '+mod.nome, group:mod.nome});
    } else {
      subKeys.forEach(function(subKey){
        var sub=mod.sub[subKey];
        out.push({key:modKey+'.'+subKey, label:sub.icon+' '+sub.nome, group:mod.icon+' '+mod.nome});
      });
    }
  });
  return out;
}

// Nome amigável para uma chave de módulo/submódulo (ex: 'oficina.comissoes')
function _moduleLabel(key){
  var parts=key.split('.');
  var mod=MODULES_TREE[parts[0]];
  if(!mod) return key;
  if(parts.length===1) return mod.icon+' '+mod.nome;
  var sub=(mod.sub||{})[parts[1]];
  return sub?(sub.icon+' '+sub.nome):key;
}

async function doLogin(){
  var u=document.getElementById('lu').value.trim(), p=document.getElementById('lp').value;
  var lerr=document.getElementById('lerr'); lerr.style.display='none';
  try{
    var res=await _supa.from('usuarios').select('*').eq('login',u).eq('senha',p).eq('ativo',true).single();
    if(res.error||!res.data){
      if(u==='admin'&&p==='admin123') CU={id:1,nome:'Administrador Master',funcao:'Administrador',login:'admin',perfil:'admin',revendas:['*'],ativo:true};
      else if(u==='gestor1'&&p==='123456') CU={id:2,nome:'Carlos Indaiatuba',funcao:'Gestor',login:'gestor1',perfil:'gestor',revendas:[17],ativo:true};
      else{lerr.textContent='Login ou senha incorretos.';lerr.style.display='block';return;}
    }else{
      CU=res.data;
      if(typeof CU.revendas==='string') try{CU.revendas=JSON.parse(CU.revendas);}catch(e){}
    }
  }catch(e){
    if(u==='admin'&&p==='admin123') CU={id:1,nome:'Administrador Master',funcao:'Administrador',login:'admin',perfil:'admin',revendas:['*'],ativo:true};
    else if(u==='gestor1'&&p==='123456') CU={id:2,nome:'Carlos Indaiatuba',funcao:'Gestor',login:'gestor1',perfil:'gestor',revendas:[17],ativo:true};
    else{lerr.textContent='Erro de conexão.';lerr.style.display='block';return;}
  }
  document.getElementById('nuser').textContent=CU.nome;
  // Logo na nav
  var navLogo=document.getElementById('logo-nav');
  if(navLogo) navLogo.src=LOGO_AUTOMEC;

  document.getElementById('s-login').style.display='none';
  document.getElementById('s-main').style.display='flex';
  STACK=[];renderBreadcrumb();showHome();
}

function go(id,lbl){STACK.push({id:id,lbl:lbl});renderBreadcrumb();renderPage();}

function curPage(){return STACK.length?STACK[STACK.length-1].id:null;}
function renderBreadcrumb(){
  var b=document.getElementById('bcrumb');
  if(!STACK.length){b.style.display='none';return;}
  b.style.display='flex';
  var h='<span onclick="goHome()" style="cursor:pointer;color:var(--gold);font-weight:600">&#x1F3E0; Início</span>';
  STACK.forEach(function(s,i){
    var last=i===STACK.length-1;
    h+='<span style="color:#aaa;margin:0 4px">/</span><span onclick="goBack('+i+')" style="cursor:pointer;color:'+(last?'#333':'var(--gold)')+'">'+H(s.lbl)+'</span>';
  });
  b.innerHTML=h;
}

// Faixas exatas do original
function dayMatchO(dias,key){
  var d=+dias||0;
  if(key==='all') return true;
  if(key==='90')  return d<=90;
  if(key==='180') return d>90&&d<=180;
  if(key==='360') return d>180&&d<=360;
  if(key==='360+') return d>360;
  return true;
}

function ruleOriginMatchO(abc,rule){
  var a=String(abc||'').toUpperCase();
  if(rule==='regra2'||rule==='regra2ab') return ['C','D','N'].indexOf(a)>=0;
  return true;
}
function ruleSoroMatchO(abc,rule){
  var a=String(abc||'').toUpperCase();
  if(rule==='all') return true;
  if(rule==='a'||rule==='regra2') return a==='A';
  if(rule==='ab'||rule==='regra2ab') return a==='A'||a==='B';
  return true;
}

function suggestTransferO(origin,soro,rule){
  if(!origin||!soro) return {text:'Sem par em Sorocaba',cls:'muted',ok:false};
  var oABC=String(origin.abc||'').toUpperCase();
  var sABC=String(soro.abc||'').toUpperCase();
  var origemAB=oABC==='A'||oABC==='B';
  var soroAB=sABC==='A'||sABC==='B';
  // QTD usa qtd_contabil (igual ao original que usa QTD_CONTABIL)
  if((+origin.qtd_contabil||0)<=0) return {text:'Sem saldo na origem',cls:'muted',ok:false};
  if(rule==='regra2'&&['C','D','N'].indexOf(oABC)<0)
    return {text:'Origem fora da regra C/D/N',cls:'muted',ok:false};
  if(!soroAB) return {text:'Sorocaba não é A/B',cls:'muted',ok:false};
  if(origemAB&&rankABC_o(oABC)<=rankABC_o(sABC)&&(+origin.dias||0)<=(+soro.dias||99999))
    return {text:'Baixa prioridade',cls:'warn',ok:false};
  var motivo=[];
  if(!origemAB) motivo.push('origem '+oABC);
  if(rankABC_o(sABC)<rankABC_o(oABC)) motivo.push('Sorocaba '+sABC);
  if((+origin.dias||0)>(+soro.dias||0)) motivo.push('dias maiores na origem');
  if(!motivo.length) motivo.push('item A/B em Sorocaba');
  return {text:'✅ Transferir — '+motivo.join(', '),cls:'ok',ok:true};
}

function whereABO(item){
  var lst=[];
  UORDER.forEach(function(rv){
    var k=rv+'|'+item;
    var r=_otiIndex[k];
    if(r){var a=String(r.abc||'').toUpperCase();if(a==='A'||a==='B')lst.push(rn(rv)+'('+a+')');}
  });
  return lst.join(', ');
}

async function loadOti(){
  // Se nenhuma revenda selecionada, pegar a primeira do select
  if(!OTI.rev||OTI.rev===0){
    var sel=document.getElementById('o-rev');
    if(sel&&sel.value&&+sel.value!==0) OTI.rev=+sel.value;
    else{S('o-tw','<div style="text-align:center;padding:3rem;color:var(--muted)">Selecione a unidade de origem.</div>');return;}
  }
  loading('o-tw');
  try{
    // 1. Buscar dados COMPLETOS da unidade origem + Sorocaba
    var revsToLoad=[OTI.rev]; if(OTI.rev!==2) revsToLoad.push(2);
    // Buscar dados completos de cada revenda separadamente (evita limite de 1000/query)
    var _allData=[];
    for(var _di=0;_di<revsToLoad.length;_di++){
      var _drv=revsToLoad[_di],_oF=0,_oM=true;
      while(_oM){
        var {data:_dd,error:_de}=await _supa.from('estoque')
          .select('revenda,item,descricao,abc,qtd_contabil,qtd_disponivel,qtd_res_oficina,qtd_alocada,demanda_media,dias,custo_medio,val_estoque,nome_grupo,locacao')
          .eq('revenda',_drv).range(_oF,_oF+899);
        if(_de) throw _de;
        var _c=_dd||[]; _allData=_allData.concat(_c);
        if(_c.length<900)_oM=false; else _oF+=900;
      }
    }
    var data=_allData;
    var error=null;

    // 2. Buscar ABC de TODAS as revendas revenda por revenda
    // (Supabase limita 1000 linhas por query — precisamos paginar por revenda)
    _otiIndex={};
    for(var _ri=0;_ri<UORDER.length;_ri++){
      var _rv=UORDER[_ri],_aF=0,_aM=true;
      while(_aM){
        var {data:_d}=await _supa.from('estoque').select('revenda,item,abc')
          .eq('revenda',_rv).range(_aF,_aF+899);
        (_d||[]).forEach(function(r){
          _otiIndex[r.revenda+'|'+r.item]={revenda:r.revenda,item:r.item,abc:r.abc};
        });
        if((_d||[]).length<900)_aM=false; else _aF+=900;
      }
    }

    // 3. Giros
    var {data:giros}=await _supa.from('itens_giro').select('revenda,cod');
    _otiGiroSet={};
    (giros||[]).forEach(function(g){_otiGiroSet[g.revenda+'|'+g.cod]=true;});

    // 4. RAW = dados completos (origem + Sorocaba)
    _otiRAW=(data||[]).map(function(r){
      return Object.assign({},r,{_isGiro:!!_otiGiroSet[r.revenda+'|'+r.item]});
    });

    // 5. Sobrescrever índice com dados completos de origem e Sorocaba
    // (mantém ABC das outras revendas intacto)
    _otiRAW.forEach(function(r){_otiIndex[r.revenda+'|'+r.item]=r;});

    // Popular grupos
    var grpSel=document.getElementById('o-grp');
    if(grpSel){
      grpSel.innerHTML='<option value="">Todos</option>';
      var grps=[...new Set(_otiRAW.filter(function(r){return r.revenda===OTI.rev;}).map(function(r){return r.nome_grupo;}).filter(Boolean))].sort();
      grps.forEach(function(g){var o=document.createElement('option');o.value=g;o.textContent=g;grpSel.appendChild(o);});
      if(OTI.grp) grpSel.value=OTI.grp;
    }
    renderOti();
  }catch(e){S('o-tw','<div class="aerr">Erro: '+H(e.message||String(e))+'</div>');}
}

function renderOti(){
  // Se nenhuma revenda selecionada, pegar a primeira do select
  if(!OTI.rev||OTI.rev===0){
    var sel=document.getElementById('o-rev');
    if(sel&&sel.value&&+sel.value!==0) OTI.rev=+sel.value;
    else{S('o-tw','<div style="text-align:center;padding:3rem;color:var(--muted)">Selecione a unidade de origem.</div>');return;}
  }
  OTI.rule=document.getElementById('o-rule')&&document.getElementById('o-rule').value||OTI.rule||'regra2';
  OTI.abc=document.getElementById('o-abc')&&document.getElementById('o-abc').value||'';
  OTI.grp=document.getElementById('o-grp')&&document.getElementById('o-grp').value||'';
  OTI.busca=(document.getElementById('o-busca')&&document.getElementById('o-busca').value||'').toLowerCase().trim();

  // Linhas da origem com filtros
  _otiOriginRows=_otiRAW.filter(function(r){
    if(r.revenda!==OTI.rev) return false;
    if(!dayMatchO(r.dias,_otiDay)) return false;
    if(OTI.abc&&r.abc!==OTI.abc) return false;
    if(OTI.grp&&r.nome_grupo!==OTI.grp) return false;
    if(OTI.busca&&!r.item.toLowerCase().includes(OTI.busca)&&!(r.descricao||'').toLowerCase().includes(OTI.busca)) return false;
    return true;
  }).map(function(r){return Object.assign({},r,{AB_LIST:whereABO(r.item)});})
    .sort(function(a,b){return(+b.dias||0)-(+a.dias||0)||rankABC_o(a.abc)-rankABC_o(b.abc);});

  // Linhas comparativo — filtro de origem por regra
  _otiCompareRows=_otiOriginRows.filter(function(r){
    return ruleOriginMatchO(r.abc,OTI.rule);
  }).map(function(r){
    var soro=_otiIndex['2|'+r.item]||null;
    var sug=suggestTransferO(r,soro,OTI.rule);
    return {
      ITEM:r.item, DESC:r.descricao, GIRO:r._isGiro,
      ORIGEM_ABC:r.abc,
      ORIGEM_QTD:+r.qtd_disponivel||0,
      ORIGEM_CONT:+r.qtd_contabil||0,
      ORIGEM_DIAS:+r.dias||0,
      ORIGEM_LOC:r.locacao||'',
      SORO_ABC:soro?soro.abc:'',
      SORO_QTD:soro?(+soro.qtd_disponivel||0):0,
      SORO_DIAS:soro?(+soro.dias||0):0,
      SORO_LOC:soro?soro.locacao||'':'',
      AB_LIST:whereABO(r.item),
      CUSTO:+r.val_estoque||0,
      SUGESTAO:sug.text, SUGESTAO_CLS:sug.cls, IS_SUG:sug.ok,
      HAS_PAIR:!!soro
    };
  }).filter(function(r){
    if(!r.HAS_PAIR) return OTI.rule==='all';
    return ruleSoroMatchO(r.SORO_ABC,OTI.rule);
  });

  // Ordenação padrão igual ao original
  _otiCompareRows.sort(function(a,b){
    if(a.IS_SUG!==b.IS_SUG) return a.IS_SUG?-1:1;
    if(rankABC_o(a.SORO_ABC)!==rankABC_o(b.SORO_ABC)) return rankABC_o(a.SORO_ABC)-rankABC_o(b.SORO_ABC);
    return (b.ORIGEM_DIAS-a.ORIGEM_DIAS)||a.ITEM.localeCompare(b.ITEM);
  });

  if(OTI.soloSug) _otiCompareRows=_otiCompareRows.filter(function(r){return r.IS_SUG;});

  // KPIs
  var origQty=_otiOriginRows.reduce(function(a,r){return a+(+r.qtd_contabil||0);},0);
  var common=_otiCompareRows.filter(function(r){return r.HAS_PAIR;}).length;
  var sugs=_otiCompareRows.filter(function(r){return r.IS_SUG;}).length;
  var val=_otiCompareRows.filter(function(r){return r.IS_SUG;}).reduce(function(a,r){return a+r.CUSTO;},0);
  S('ok-orig',fmtN(_otiOriginRows.length));
  S('ok-qty',fmtN(origQty));
  S('ok-common',fmtN(common));
  S('ok-sug',fmtN(sugs));
  S('ok-val',fmt(val));

  renderOtiTable();
}

function sortOtiCol(col){
  if(_otiSortCol===col)_otiSortDir*=-1;else{_otiSortCol=col;_otiSortDir=-1;}
  renderOtiTable();
}

function exportOti(){
  var rows;
  if(OTI.tab==='compare'){
    if(!_otiCompareRows.length){alert('Nada para exportar.');return;}
    rows=_otiCompareRows.map(function(r){return{'Código':r.ITEM,'Descrição':r.DESC,'Giro':r.GIRO?'SIM':'','ABC Origem':r.ORIGEM_ABC,'Qtd Disp':r.ORIGEM_QTD,'Contábil':r.ORIGEM_CONT,'Dias Origem':r.ORIGEM_DIAS,'Locação Origem':r.ORIGEM_LOC,'ABC Sorocaba':r.SORO_ABC,'Qtd Sorocaba':r.SORO_QTD,'Dias Sorocaba':r.SORO_DIAS,'Locação Sorocaba':r.SORO_LOC,'A/B em outras':r.AB_LIST,'Sugestão':r.SUGESTAO};});
  }else{
    if(!_otiOriginRows.length){alert('Nada para exportar.');return;}

async function loadGiro(selRev,adm,revIds){
  try{
    var _lgRevs=adm&&selRev===0?UORDER:(adm?[selRev]:[revIds[0]]);
    var giros=[];
    for(var _lgi=0;_lgi<_lgRevs.length;_lgi++){
      var {data:_lgd}=await _supa.from('itens_giro').select('*').eq('revenda',_lgRevs[_lgi]).order('grupo').order('cod').limit(5000);
      giros=giros.concat(_lgd||[]);
    }
    var e1=null;
    // Buscar estoque cruzado por revenda
    var est=[];
    for(var _lei=0;_lei<_lgRevs.length;_lei++){
      var {data:_led}=await _supa.from('estoque').select('revenda,item,qtd_contabil,qtd_disponivel,qtd_res_oficina,qtd_alocada,qtd_orcada,demanda_media,abc').eq('revenda',_lgRevs[_lei]).limit(10000);
      est=est.concat(_led||[]);
    }
    var estIdx={};(est||[]).forEach(function(r){estIdx[r.revenda+'|'+r.item]=r;});

    _giroRows=(giros||[]).map(function(g){
      var e=estIdx[g.revenda+'|'+g.cod]||null;
      var eO=g.cod_opcional?estIdx[g.revenda+'|'+g.cod_opcional]:null;
      return Object.assign({},g,{
        _cont:e?+e.qtd_contabil:null,_disp:e?+e.qtd_disponivel:null,
        _ros:e?+e.qtd_res_oficina:null,_aloc:e?+e.qtd_alocada:null,
        _dem:e?+e.demanda_media:null,_abc:e?e.abc:null,
        _opcDisp:eO?+eO.qtd_disponivel:null
      });
    });

    var urg=_giroRows.filter(function(r){return r._disp!==null&&r._disp<=r.est_min;}).length;
    S('g-cnt',fmtN(_giroRows.length));
    S('g-urg',fmtN(urg));
    S('g-alerts',urg>0?'<div class="awarn">&#x26A0; '+urg+' iten(s) abaixo do estoque mínimo.</div>':'');
    var showRevCol=adm&&(!selRev||selRev===0);
    renderGiroTable(showRevCol);
  }catch(e){S('g-tb','<tr><td colspan="15" class="aerr">Erro: '+H(e.message||String(e))+'</td></tr>');}
}

function renderGiroTable(showRev){
  var busca=(GS.busca||'').toLowerCase().trim();
  var rows=_giroRows;
  if(busca) rows=rows.filter(function(r){return r.cod.toLowerCase().includes(busca)||(r.descricao||'').toLowerCase().includes(busca);});
  var tb=document.getElementById('g-tb'); if(!tb)return;
  if(!rows.length){tb.innerHTML='<tr><td colspan="15" style="text-align:center;padding:2rem;color:var(--muted)">Nenhum item encontrado.</td></tr>';return;}
  rows.sort(function(a,b){
    var av=a[_giroSC]; var bv=b[_giroSC];
    if(av===null||av===undefined)av=''; if(bv===null||bv===undefined)bv='';
    if(typeof av==='string')return _giroSD*String(av).localeCompare(String(bv));
    return _giroSD*((+av||0)-(+bv||0));
  });
  tb.innerHTML=rows.map(function(g){
    var dp=g._disp,dc=dp===null?'#aaa':dp===0?'var(--red)':dp<=g.est_min?'var(--orange)':'var(--green)';
    var opcInfo=g.cod_opcional?('<code>'+H(g.cod_opcional)+'</code>'+(g._opcDisp!==null?' <span style="font-size:10px;color:'+(g._opcDisp>0?'var(--green)':'var(--red)')+'">'+fmtN(g._opcDisp)+'</span>':'')):'—';
    var comprar=dp!==null?Math.max(0,g.est_min-dp+Math.ceil(g._dem||0)):g.est_min;
    var sit=dp!==null&&dp<=g.est_min?'<span class="badge bcrit">&#x26A0; Comprar '+comprar+'un</span>':dp===null?'<span class="badge" style="background:#f5f5f5;color:#999">Sem dado</span>':'<span class="badge bok">&#x2713; OK</span>';
    var rc=showRev?'<td><span class="badge bgold">'+rn(g.revenda)+'</span></td>':'';
    return '<tr>'+
      '<td><code>'+H(g.cod)+'</code></td>'+
      '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">'+H(g.descricao||g.desc||'')+'</td>'+
      rc+
      '<td style="font-size:11px">'+H(g.grupo||'—')+'</td>'+
      '<td>'+opcInfo+'</td>'+
      '<td class="num"><strong>'+g.est_min+'</strong></td>'+
      '<td class="num">'+(g._cont!==null?fmtN(g._cont):'<span style="color:#bbb">—</span>')+'</td>'+
      '<td class="num" style="font-weight:700;color:'+dc+';background:#fffbf0">'+(dp!==null?fmtN(dp):'<span style="color:#bbb">—</span>')+'</td>'+
      '<td class="num"'+(g._ros>0?' style="color:var(--orange)"':'')+'>'+((g._ros!==null)?fmtN(g._ros):'<span style="color:#bbb">—</span>')+'</td>'+
      '<td class="num">'+((g._aloc!==null)?fmtN(g._aloc):'<span style="color:#bbb">—</span>')+'</td>'+
      '<td class="num">'+((g._dem!==null)?fmtN(g._dem):'<span style="color:#bbb">—</span>')+'</td>'+
      '<td>'+(g._abc?tagABC(g._abc):'<span style="color:#bbb">—</span>')+'</td>'+
      '<td>'+opcInfo+'</td>'+
      '<td>'+sit+'</td>'+
      '<td style="white-space:nowrap">'+
        '<button class="btn bsm bout" onclick="modalEditGiro('+g.id+')">✎</button> '+
        '<button class="btn bsm bred" onclick="delGiro('+g.id+','+g.revenda+')">✕</button>'+
      '</td></tr>';
  }).join('');
}

// ── Enviar necessidades de compra por e-mail ─────────────────────────────────
function emailMan(){
  // Filtrar só itens com necessidade de compra
  var compras=(_manRows||[]).filter(function(r){
    if(!r._isGiro) return false;
    var dp=+r.qtd_disponivel||0;
    var em=r._giro?r._giro.est_min:0;
    var dem=+r.demanda_media||0;
    var meta=Math.max(em,Math.ceil(dem));
    return dp<meta;
  });
  if(!compras.length){alert('Nenhuma necessidade de compra encontrada nos filtros atuais.');return;}

  // Gerar Excel
  var ws=XLSX.utils.json_to_sheet(compras.map(function(r){
    var dp=+r.qtd_disponivel||0;
    var em=r._giro?r._giro.est_min:0;
    var dem=+r.demanda_media||0;
    var meta=Math.max(em,Math.ceil(dem));
    var sg=Math.max(0,meta-dp);
    return{
      'Revenda':rn(r.revenda),'Código':r.item,'Descrição':r.descricao,
      'ABC':r.abc,'Disponível':dp,'Est.Mín.':em,
      'Demanda/mês':dem,'Sugestão compra':sg,
      'Preço pub.':+r.preco_publico||0,
      'Valor estimado':sg*(+r.preco_publico||0),
      'Prioridade':dp<=0?'URGENTE':dp<em?'COMPRAR':'REPOR'
    };
  }));
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Necessidades');
  var wbout=XLSX.write(wb,{bookType:'xlsx',type:'base64'});

  // Montar link mailto com instruções
  var email='';
  if(CU&&CU.email) email=CU.email;
  else if(CU&&CU.id) email=CU.email||'';
  var assunto=encodeURIComponent('Necessidades de Compra — '+new Date().toLocaleDateString('pt-BR'));
  var corpo=encodeURIComponent(
    'Olá '+((CU&&CU.nome)||'')+',%0A%0A'+
    'Segue em anexo a lista de necessidades de compra gerada pelo Sistema Automec.%0A%0A'+
    'Total de itens: '+compras.length+'%0A'+
    'Data: '+new Date().toLocaleDateString('pt-BR')+'%0A%0A'+
    'Para baixar o arquivo Excel, acesse o sistema e use o botão Excel na tela de Manutenção.%0A%0A'+
    'Sistema Automec — Gestão de Estoque'
  );

  // Baixar o Excel automaticamente
  XLSX.writeFile(wb,'necessidades_compra_'+new Date().toISOString().slice(0,10)+'.xlsx');

  // Abrir cliente de e-mail
  // Baixar sempre
  // Informar sobre e-mail
  if(email){
    var conf=confirm('✅ Excel baixado com '+compras.length+' itens!\n\nDeseja abrir seu e-mail para enviar para:\n'+email+'?');
    if(conf) window.open('mailto:'+email+'?subject='+assunto+'&body='+corpo,'_blank');
  } else {
    alert('✅ Excel baixado com '+compras.length+' itens!\n\n💡 Para habilitar o envio por e-mail:\nAcesse Configurações → edite seu usuário → preencha o campo E-mail.\n\n(Após salvar, o e-mail fica disponível no próximo acesso)');
  }
}

function sortDash(c){
  if(_dashSC===c)_dashSD*=-1;else{_dashSC=c;_dashSD=1;}
  if(!_dashRows.length)return;
  _dashRows.sort(function(a,b){
    var av=a[c]===null||a[c]===undefined?'':a[c];
    var bv=b[c]===null||b[c]===undefined?'':b[c];
    if(typeof av==='string')return _dashSD*av.localeCompare(bv);
    return _dashSD*((+av||0)-(+bv||0));
  });
  var tbody=document.querySelector('#d-content tbody');if(!tbody)return;
  tbody.innerHTML=_dashRows.map(function(r){
    var dp=+r.qtd_disponivel||0;
    var dc=dp===0&&r.demanda_media>0?'var(--red)':dp<(+r.demanda_media||0)&&r.demanda_media>0?'var(--orange)':'var(--green)';
    var dd=r.dias>360?'var(--red)':r.dias>180?'var(--orange)':r.dias>90?'#f9a825':'inherit';
    return'<tr><td><code>'+H(r.item)+'</code></td>'+
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">'+H(r.descricao||'')+'</td>'+
      '<td>'+tagABC(r.abc)+'</td><td class="num">'+fmtN(r.qtd_contabil)+'</td>'+
      '<td class="num" style="font-weight:700;color:'+dc+';background:#fffbf0">'+fmtN(dp)+'</td>'+
      '<td class="num">'+fmtN(r.qtd_res_oficina)+'</td><td class="num">'+fmtN(r.qtd_alocada)+'</td>'+
      '<td class="num">'+fmtN(r.demanda_media)+'</td><td class="num" style="color:'+dd+'">'+fmtN(r.dias)+'</td>'+
      '<td class="num">'+fmt(r.custo_medio)+'</td><td class="num">'+fmt(r.val_estoque)+'</td>'+
      '<td style="font-size:11px">'+H(r.locacao||'—')+'</td></tr>';
  }).join('');
}

var _drillEstIdx={};
var _drillEstLoaded=false;

async function _ensureEstIdx(){
  if(_drillEstLoaded) return;
  var rev=OFI.rev, from=0, more=true;
  while(more){
    var {data:ed}=await _supa.from('estoque')
      .select('item,custo_medio,preco_publico,descricao')
      .eq('revenda',rev).range(from,from+899);
    (ed||[]).forEach(function(r){ _drillEstIdx[(r.item||'').toUpperCase()]=r; });
    if((ed||[]).length<900) more=false; else from+=900;
  }
  _drillEstLoaded=true;
}

function _drillKpiBar(rows,showMargem){
  var cfgOf=_cfgOfiData||{};
  var agg10=(cfgOf.agg10||CFG_OFICINA_DEFAULTS.agg10||[]);
  var agg4 =(cfgOf.agg4 ||CFG_OFICINA_DEFAULTS.agg4 ||[]);
  var m10={},m4={};
  agg10.forEach(function(a){m10[a.cod]=1;(a.alts||[]).forEach(function(x){m10[x]=1;});});
  agg4.forEach(function(a) {m4[a.cod]=1; (a.alts||[]).forEach(function(x){m4[x]=1; });});
  var sRows=rows.filter(function(r){return r.tipo_item==='S';});
  var pRows=rows.filter(function(r){return r.tipo_item==='P';});
  var fatSvc=sRows.reduce(function(s,r){return s+(+r.vlr_item||0);},0);
  var fatPec=pRows.reduce(function(s,r){return s+(+r.vlr_item||0);},0);
  var fatA10=0,fatA4=0,custoTot=0,recPec=0;
  pRows.forEach(function(r){
    var it=(r.item||'').toUpperCase(),v=+r.vlr_item||0;
    if(m10[it]) fatA10+=v;
    if(m4[it])  fatA4+=v;
    recPec+=v;
    if(showMargem){
      var e=_drillEstIdx[it];
      custoTot+=(e?+e.custo_medio||0:0)*(+r.quantidade||1);
    }
  });
  var fatTot=fatSvc+fatPec;
  var margem=recPec>0?((recPec-custoTot)/recPec*100):null;
  var ks='flex:1;min-width:110px;background:#f8f8f8;border-radius:8px;padding:8px 12px;border-left:3px solid ';
  var mCor=margem===null?'#888':margem>=30?'#2e7d32':margem>=15?'#e65100':'#c62828';
  return'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'+
    '<div style="'+ks+'#1a237e"><div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:600">Fat. Total</div><div style="font-size:16px;font-weight:700;color:#1a237e">'+fmt(fatTot)+'</div></div>'+
    '<div style="'+ks+'#2e7d32"><div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:600">Servi\u00e7os</div><div style="font-size:16px;font-weight:700;color:#2e7d32">'+fmt(fatSvc)+'</div></div>'+
    '<div style="'+ks+'#1565c0"><div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:600">Pe\u00e7as</div><div style="font-size:16px;font-weight:700;color:#1565c0">'+fmt(fatPec)+'</div></div>'+
    '<div style="'+ks+'#6a1b9a"><div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:600">Agg 10%</div><div style="font-size:16px;font-weight:700;color:#6a1b9a">'+fmt(fatA10)+'</div></div>'+
    '<div style="'+ks+'#00695c"><div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:600">Agg 4%</div><div style="font-size:16px;font-weight:700;color:#00695c">'+fmt(fatA4)+'</div></div>'+
    (showMargem&&margem!==null?'<div style="'+ks+mCor+'"><div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:600">Margem bruta pe\u00e7as</div><div style="font-size:16px;font-weight:700;color:'+mCor+'">'+margem.toFixed(1)+'%</div><div style="font-size:9px;color:#aaa">s/ impostos</div></div>':'')+
    '</div>';
}

async function loadOfiCard(){
  _drillEstLoaded=false; _drillEstIdx={};
  if(!_cfgOfiData){ var _r=await _cfgGet('cfg_oficina'); _cfgOfiData=Object.assign({},CFG_OFICINA_DEFAULTS,_r||{}); }
  if(!_cfgUniPolsData){ var _r2=await _cfgGet('cfg_uni_pols'); _cfgUniPolsData=_r2||{}; }
  var el=document.getElementById('ofi-card-content');
  if(!el) return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var p=OFI.mes.split('-');
  var ano=+p[0], mes=+p[1];
  var dtIni=ano+'-'+String(mes).padStart(2,'0')+'-01';
  var ultimoDia=new Date(ano,mes,0).getDate();
  var dtFim=ano+'-'+String(mes).padStart(2,'0')+'-'+String(ultimoDia).padStart(2,'0');

  var rows=[], from=0, more=true;
  while(more){
    var {data:d,error:e}=await _supa.from('oficina_os')
      .select('*').eq('revenda',OFI.rev)
      .gte('data_os',dtIni).lte('data_os',dtFim)
      .range(from,from+899);
    if(e){el.innerHTML='<div style="color:red;padding:1rem">Erro: '+e.message+'</div>';return;}
    rows=rows.concat(d||[]);
    if((d||[]).length<900) more=false; else from+=900;
  }
  _ofiRows=rows;

  if(!rows.length){
    el.innerHTML='<div style="text-align:center;padding:3rem;color:#aaa">'+
      getIcon('card_tecnico',48,'#ddd')+
      '<p style="margin-top:1rem">Nenhum dado para '+rn(OFI.rev)+' — '+OFI.mes+'</p></div>';
    return;
  }

  // Extrair técnicos — APENAS os cadastrados com cod_mec (não duplicar alinhador/AC)
  var saved=await _tecsLoad();
  // Cods de alinhador e AC para excluir dos avatares
  var codsAlin=new Set(), codsAC=new Set();
  Object.values(saved).forEach(function(t){
    if(t.cod_alin) codsAlin.add(String(t.cod_alin));
    if(t.cod_ac)   codsAC.add(String(t.cod_ac));
  });
  // Montar mapa de técnicos: somente cod_mec cadastrado e ativo
  var tecsMap={};
  // Primeiro: técnicos que existem no cadastro com cod_mec
  Object.values(saved).filter(function(t){return t.ativo!==false&&t.cod_mec;}).forEach(function(t){
    tecsMap[t.cod_mec]={cod:t.cod_mec, nome:t.nome||t.cod_mec, foto:t.foto||''};
  });
  // Filtrar: somente os que aparecem nos dados do mês
  var codsNoDados=new Set(rows.map(function(r){return r.mecanico;}));
  tecsMap=Object.fromEntries(Object.entries(tecsMap).filter(function(e){return codsNoDados.has(e[0]);}));
  var tecs=Object.values(tecsMap).sort(function(a,b){return a.nome.localeCompare(b.nome);});
  if(!tecs.length){
    // Fallback: técnicos do banco não cadastrados (excluindo alin/AC)
    rows.filter(function(r){return r.tipo_item==='S'&&r.mecanico;}).forEach(function(r){
      if(codsAlin.has(r.mecanico)||codsAC.has(r.mecanico)) return;
      if(!tecsMap[r.mecanico]) tecsMap[r.mecanico]={cod:r.mecanico,nome:r.nome_mecanico||r.mecanico,foto:''};
    });
    tecs=Object.values(tecsMap).sort(function(a,b){return a.nome.localeCompare(b.nome);});
  }
  if(!OFI.tec||!tecsMap[OFI.tec]) OFI.tec=tecs.length?tecs[0].cod:'';

  // ── AVATARES ESTILO POWER BI ─────────────────────────────────────────────
  // Calcular faturamento por técnico para exibir abaixo do avatar
  var fatPorTec={};
  rows.forEach(function(r){
    if(!r.mecanico) return;
    if(!fatPorTec[r.mecanico]) fatPorTec[r.mecanico]=0;
    fatPorTec[r.mecanico]+=(+r.vlr_item||0);
  });

  var avatares=tecs.map(function(t){
    var isAtivo=OFI.tec===t.cod;
    var primeiroNome=t.nome.split(' ')[0];
    var fatTecnico=fatPorTec[t.cod]||0;
    var fatFormatado='R$ '+Math.round(fatTecnico).toLocaleString('pt-BR');
    var fotoHTML=t.foto
      ? '<img src="'+t.foto+'" style="width:100%;height:100%;object-fit:cover"/>'
      : '<span style="font-size:26px;font-weight:700;color:'+(isAtivo?'#c8a227':'#1a237e')+'">'+primeiroNome.charAt(0)+'</span>';
    return'<div class="av-item" data-cod="'+t.cod+'" '+
      'style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;'+
      'min-width:80px;padding:8px 4px;border-radius:10px;transition:.2s;'+
      'background:'+(isAtivo?'#f5f0e0':'transparent')+';'+
      'border:2px solid '+(isAtivo?'#c8a227':'transparent')+'">'+
      // Avatar
      '<div style="width:64px;height:64px;border-radius:50%;'+
      'border:3px solid '+(isAtivo?'#c8a227':'#ddd')+';'+
      'overflow:hidden;display:flex;align-items:center;justify-content:center;'+
      'background:'+(isAtivo?'#fff8e1':'#f5f5f5')+';'+
      'box-shadow:'+(isAtivo?'0 4px 12px #c8a22740':'0 2px 6px #0001')+'">'+
      fotoHTML+'</div>'+
      // Faturamento
      '<div style="font-size:11px;font-weight:700;color:'+(isAtivo?'#c8a227':'#333')+';text-align:center">'+
      fatFormatado+'</div>'+
      // Nome
      '<div style="font-size:10px;color:'+(isAtivo?'#1a237e':'#888')+';font-weight:'+(isAtivo?'700':'400')+';'+
      'text-align:center;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+
      primeiroNome+'</div>'+
      '</div>';
  }).join('');

  var MESES2=['','Janeiro','Fevereiro','Março','Abril','Maio','Junho',
    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  el.innerHTML=
    // Linha de avatares
    '<div style="background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.5rem;margin-bottom:1.2rem">'+
    '<div style="font-size:11px;color:#888;margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Selecione o técnico</div>'+
    '<div class="av-grid" style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;overflow-x:auto;padding-bottom:4px">'+avatares+'</div>'+
    '</div>'+
    // Container do card individual
    '<div id="ofi-dash-tec"></div>';

  renderCardTec();
}

function renderCardTec(){
  if(!_ofiRows.length||!OFI.tec) return;
  // Recriar linha de avatares — somente técnicos cadastrados (nome principal do cadastro)
  var saved={}; try{saved=_tecsCache||{};}catch(e){}
  var codsNoMes=new Set(_ofiRows.map(function(r){return r.mecanico;}));
  var tecsMap2={};
  Object.values(saved).filter(function(t){return t.ativo!==false&&t.cod_mec&&codsNoMes.has(t.cod_mec);}).forEach(function(t){
    tecsMap2[t.cod_mec]={cod:t.cod_mec, nome:t.nome||t.cod_mec, foto:t.foto||''};
  });
  // Fallback: se nenhum cadastrado, pega do banco excluindo alin/AC
  if(!Object.keys(tecsMap2).length){
    var codsAlin2=new Set(), codsAC2=new Set();
    Object.values(saved).forEach(function(t){
      if(t.cod_alin) codsAlin2.add(String(t.cod_alin));
      if(t.cod_ac) codsAC2.add(String(t.cod_ac));
    });
    _ofiRows.filter(function(r){return r.tipo_item==='S'&&r.mecanico;}).forEach(function(r){
      var eq=(r.nome_equipe||'').toUpperCase();
      if(eq.indexOf('FUNILARIA')>=0) return;
      if(codsAlin2.has(r.mecanico)||codsAC2.has(r.mecanico)) return;
      if(!tecsMap2[r.mecanico]) tecsMap2[r.mecanico]={cod:r.mecanico,nome:r.nome_mecanico||r.mecanico,foto:''};
    });
  }
  var tecs2=Object.values(tecsMap2).sort(function(a,b){return a.nome.localeCompare(b.nome);});
  var fatPorTec2={};
  _ofiRows.forEach(function(r){
    if(!r.mecanico) return;
    if(!fatPorTec2[r.mecanico]) fatPorTec2[r.mecanico]=0;
    fatPorTec2[r.mecanico]+=(+r.vlr_item||0);
  });
  var novoAv=tecs2.map(function(t){
    var isAtivo=OFI.tec===t.cod;
    var pNome=t.nome.split(' ')[0];
    var fatT=fatPorTec2[t.cod]||0;

      ?'<img src="'+t.foto+'" style="width:100%;height:100%;object-fit:cover"/>'
      :'<span style="font-size:26px;font-weight:700;color:'+(isAtivo?'#c8a227':'#1a237e')+'">'+pNome.charAt(0)+'</span>';
    return'<div class="av-item" data-cod="'+t.cod+'" '+
      'style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:80px;padding:8px 4px;border-radius:10px;transition:.2s;'+
      'background:'+(isAtivo?'#f5f0e0':'transparent')+';border:2px solid '+(isAtivo?'#c8a227':'transparent')+'">'+
      '<div style="width:64px;height:64px;border-radius:50%;border:3px solid '+(isAtivo?'#c8a227':'#ddd')+';'+
      'overflow:hidden;display:flex;align-items:center;justify-content:center;background:'+(isAtivo?'#fff8e1':'#f5f5f5')+';'+
      'box-shadow:'+(isAtivo?'0 4px 12px #c8a22740':'0 2px 6px #0001')+'">'+fHtml+'</div>'+
      '<div style="font-size:11px;font-weight:700;color:'+(isAtivo?'#c8a227':'#333')+';text-align:center">'+
      'R$ '+Math.round(fatT).toLocaleString('pt-BR')+'</div>'+
      '<div style="font-size:10px;color:'+(isAtivo?'#1a237e':'#888')+';font-weight:'+(isAtivo?'700':'400')+';'+
      'text-align:center;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+pNome+'</div>'+
      '</div>';
  }).join('');
  // Atualizar avatares no DOM (highlight do técnico selecionado)
  var avCont=document.querySelector('#ofi-card-content .av-grid');
  if(avCont){
    avCont.innerHTML=novoAv;
    bindAvatares(avCont);
  } else {
    // av-grid não encontrado — recarregar tudo
    return loadOfiCard();
  }
  var el=document.getElementById('ofi-dash-tec');
  if(!el) return;

  // Aplicar filtros interativos
  var baseRows=_ofiRows.filter(function(r){return r.mecanico===OFI.tec;});

    if(_ofiFiltro.dia && r.data_os && r.data_os.substring(0,10)!==_ofiFiltro.dia) return false;
    if(_ofiFiltro.tipo && r.tipo_servico!==_ofiFiltro.tipo) return false;
    return true;
  });
  var filtroAtivo=_ofiFiltro.dia||_ofiFiltro.tipo;
  if(!tRows.length&&filtroAtivo) tRows=baseRows; // fallback se filtro vazio
  var saved={}; try{saved=_tecsCache||{};}catch(e){}
  var tecInfo=Object.values(saved).find(function(t){return t.cod_mec===OFI.tec;})||
    {nome:(_ofiRows.find(function(r){return r.mecanico===OFI.tec;})||{}).nome_mecanico||OFI.tec};

  var sRows=tRows.filter(function(r){return r.tipo_item==='S';});
  var pRows=tRows.filter(function(r){return r.tipo_item==='P';});
  var osU={}; tRows.forEach(function(r){osU[r.nro_os]=1;});
  var totalOS=Object.keys(osU).length;
  var fatSvc=sRows.reduce(function(s,r){return s+(+r.vlr_item||0);},0);
  var fatPec=pRows.reduce(function(s,r){return s+(+r.vlr_item||0);},0);
  var fatTot=fatSvc+fatPec;
  var ticketMedio=totalOS>0?fatTot/totalOS:0;

  // Por tipo de serviço
  var porTipo={};
  tRows.forEach(function(r){
    var ts=r.tipo_servico||'?';
    if(!porTipo[ts]) porTipo[ts]={os:{},fatS:0,fatP:0,qtd:0};
    porTipo[ts].os[r.nro_os]=1;
    if(r.tipo_item==='S') porTipo[ts].fatS+=(+r.vlr_item||0);
    if(r.tipo_item==='P') porTipo[ts].fatP+=(+r.vlr_item||0);
  });

  // Faturamento por dia
  var porDia={};
  tRows.forEach(function(r){
    if(!r.data_os) return;
    var d=r.data_os.substring(0,10);
    if(!porDia[d]) porDia[d]={svc:0,pec:0};
    if(r.tipo_item==='S') porDia[d].svc+=(+r.vlr_item||0);
    else porDia[d].pec+=(+r.vlr_item||0);
  });
  var diasKeys=Object.keys(porDia).sort();

  // Agregados 10% e 4%

  agg4.forEach(function(a){mapAgg4[a.cod]=a.cod;(a.alts||[]).forEach(function(x){mapAgg4[x]=a.cod;});});

  var fatAgg10=0, fatAgg4=0;
  pRows.forEach(function(r){

  // Ticket médio agregados

  // ── KPIs principais ───────────────────────────────────────────────────────
  var kpis=[
    {lbl:'Faturamento Total',val:fmt(fatTot),cor:'#1a237e',icon:'comissoes',sub:fmt(fatSvc)+' serv. + '+fmt(fatPec)+' peças'},

    {lbl:'Ticket Médio',val:fmt(ticketMedio),cor:'#e65100',icon:'dashboard',sub:'por OS total'},
    {lbl:'Agregados 10%',val:fmt(fatAgg10),cor:'#6a1b9a',icon:'agregados',sub:'Ticket: '+fmt(ticketAgg10)},
    {lbl:'Agregados 4%',val:fmt(fatAgg4),cor:'#00695c',icon:'agregados',sub:'por peça específica'},
  ];

  var kpisHtml=kpis.map(function(k){
    return'<div style="background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem;'+
      'border-left:4px solid '+k.cor+';flex:1;min-width:140px">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
      '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase">'+k.lbl+'</div>'+

      '<div style="font-size:11px;color:#aaa;margin-top:4px">'+k.sub+'</div>'+
      '</div>';

  // ── Gráfico barras por dia ─────────────────────────────────────────────────
  var barrasHtml=diasKeys.map(function(d){
    var vSvc=porDia[d].svc, vPec=porDia[d].pec, vTot=vSvc+vPec;

    var dia=d.substring(8,10);
    var diaAtivo=_ofiFiltro.dia===d;
    return'<div onclick="filtrarOfiDia(\''+d+'\')" '+

      'border-radius:4px;padding:2px;background:'+(diaAtivo?'#fff8e1':'transparent')+';'+
      'outline:'+(diaAtivo?'2px solid #c8a227':'none')+'" '+
      'title="'+d+': '+fmt(vTot)+'">'+
      '<div style="font-size:8px;color:#aaa;margin-bottom:2px">'+fmt(vTot).replace('R$','').trim()+'</div>'+
      '<div style="display:flex;flex-direction:column;justify-content:flex-end;height:56px;width:100%;gap:1px">'+
      '<div style="height:'+hPec+'px;background:#c8a22780;border-radius:2px 2px 0 0;min-height:2px"></div>'+
      '<div style="height:'+hSvc+'px;background:#c8a227;border-radius:2px 2px 0 0;min-height:2px"></div>'+
      '</div>'+

  var tiposHtml=tiposOrder.filter(function(ts){return porTipo[ts];}).map(function(ts){

    var cor=tiposCores[ts]||'#555';

    var diaTag=_ofiFiltro.dia?'<span style="font-size:9px;opacity:.7"> dia '+_ofiFiltro.dia.substring(8,10)+'</span>':'';
    return'<div onclick="abrirDrillOS(\''+ts+'\')" '+

      '</div></div>';
  }).join('');

  var nomeCompleto=tecInfo.nome||(Object.values((_ofiRows.reduce(function(m,r){

  var fotoHtml=tecInfo.foto
    ? '<img src="'+tecInfo.foto+'" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid #c8a227"/>'

  var filtroBanner=filtroAtivo
    ?'<div style="background:#fff8e1;border:1px solid #c8a227;border-radius:8px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:12px;color:#e65100">🔍 Filtro ativo: '+
      (_ofiFiltro.dia?'Dia '+_ofiFiltro.dia.substring(8,10):'')+

var _ofiTecsData = {};

async function showOfiTecs(){
  loading('mc');
  var adm=isAdmin(), revIds=revAtivas();
  var revs=adm?[1,2,4,5,7,8,10,15,16,17]:revIds;
  if(OFI.rev===undefined||OFI.rev===null||OFI.rev==='') OFI.rev=0;

  // Carregar técnicos do Supabase
  _tecsCache=null;
  var tecsMap=await _tecsLoad();
  _ofiTecsData=tecsMap;

  // Filtrar por unidade — robusto para chaves string ou number
  var tecs=Object.values(tecsMap).filter(function(t){
    if(!OFI.rev||OFI.rev===0) return true;
    var revObj=t.revendas||{};
    // Chaves podem ser string ou number
    var revKeys=Object.keys(revObj);
    return revKeys.indexOf(String(OFI.rev))>=0 || revKeys.map(Number).indexOf(OFI.rev)>=0;
  }).sort(function(a,b){return a.nome.localeCompare(b.nome);});

  // Selector de unidade
  var revOpts=revs.map(function(id){
    return'<option value="'+id+'"'+(OFI.rev==id?' selected':'')+'>'+rn(id)+'</option>';
  }).join('');
  revOpts='<option value="0"'+(OFI.rev===0?' selected':'')+'>Todas as unidades</option>'+revOpts;

  // Buscar política da unidade
  var uniPolsRaw=await _cfgGet('cfg_uni_pols');
  var uniPols=uniPolsRaw||{};
  _cfgUniPolsData=uniPols;

  S('mc',
    // Cabeçalho igual ao de Usuários
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem">'+
    '<div>'+
    '<div style="display:flex;align-items:center;gap:10px">'+getIcon('usuarios',28,'#1a237e')+'<h2 style="font-size:18px;font-weight:700;margin:0">Técnicos cadastrados</h2></div>'+
    '<p style="font-size:12px;color:var(--muted);margin-top:2px">'+tecs.length+' técnicos</p>'+
    '</div>'+
    '<div style="display:flex;gap:8px;align-items:center">'+
    '<select onchange="OFI.rev=+this.value;showOfiTecs()" style="padding:8px 12px;border-radius:6px;border:1px solid #ddd;font-size:13px">'+revOpts+'</select>'+

    '</div></div>'+

    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
    '<input type="checkbox" id="tecs-chk-all" onchange="toggleAllTecs(this)" style="width:15px;height:15px;cursor:pointer"/>'+
    '<label style="font-size:13px;color:#555;cursor:pointer" onclick="document.getElementById(\'tecs-chk-all\').click()">Selecionar todos</label>'+
    '<button id="btn-excluir-lote" class="btn bxs" style="display:none;border-color:#ef9a9a;color:#c62828;background:#fff8f8;margin-left:8px" onclick="excluirLoteTecs()">🗑️ Excluir selecionados</button>'+
    '</div>'+
    '<div class="tw"><table><thead><tr>'+
    '<th style="width:32px"><input type="checkbox" id="tecs-chk-all2" onchange="toggleAllTecs(this)" style="width:15px;height:15px;cursor:pointer"/></th>'+
    '<th>Nome</th><th>Cód. Mec.</th><th>Cód. Alin.</th><th>Cód. AC</th>'+
    '<th>Política</th><th>Unidades</th><th>Status</th><th>Ação</th>'+
    '</tr></thead><tbody>'+
    tecs.map(function(t){
      // Política vem de Configurações → Políticas por Unidade
      var revArr=Object.keys(t.revendas).map(Number);

        var up=uniPols[revArr[i]];

function toggleAllTecs(chk){
  var all=document.querySelectorAll('.tec-chk');
  all.forEach(function(c){c.checked=chk.checked;});
  // Sincronizar ambos os checkboxes de header
  var c1=document.getElementById('tecs-chk-all');
  var c2=document.getElementById('tecs-chk-all2');
  if(c1) c1.checked=chk.checked;
  if(c2) c2.checked=chk.checked;
  atualizarBtnLote();
}

function atualizarBtnLote(){
  var sel=document.querySelectorAll('.tec-chk:checked').length;
  var btn=document.getElementById('btn-excluir-lote');
  if(btn){
    btn.style.display=sel>0?'inline-block':'none';
    btn.textContent='🗑️ Excluir '+sel+' selecionado'+(sel>1?'s':'');
  }
}

async function excluirLoteTecs(){
  var sels=document.querySelectorAll('.tec-chk:checked');
  if(!sels.length) return;
  var nomes=[].slice.call(sels).map(function(c){return decodeURIComponent(c.getAttribute('data-nome'));});
  if(!confirm('Excluir '+nomes.length+' técnico(s) selecionado(s)?\n\n'+nomes.slice(0,5).join('\n')+(nomes.length>5?'\n...':'')+'\n\nEsta ação não pode ser desfeita.')) return;
  var excPromises=nomes.map(async function(n){
    var t=_ofiTecsData[n];
    await _tecExcluir(n, t&&t.cod_mec?t.cod_mec:null);
    delete _ofiTecsData[n];
  });
  await Promise.all(excPromises);
  _tecsCache=null;
  showOfiTecs();
}

async function excluirTec(btn){
  var nome=decodeURIComponent(btn.getAttribute('data-nome'));
  if(!confirm('Excluir técnico "'+nome+'" do cadastro?\nEsta ação não pode ser desfeita.')) return;
  await marcarExcluido(nome);
}

async function marcarExcluido(nome){
  var t=_ofiTecsData[nome];
  await _tecExcluir(nome, t&&t.cod_mec?t.cod_mec:null);
  delete _ofiTecsData[nome];
  _tecsCache=null;
  showOfiTecs();
}

async function toggleTec(btn){
  var nome=decodeURIComponent(btn.getAttribute('data-nome'));
  var ativo=btn.getAttribute('data-ativo')==='true';
  var t=_ofiTecsData[nome]; if(!t) return;
  t.ativo=!ativo;
  await salvarTodosTecs(true);
  showOfiTecs();
}

function previewFotoTec(inp){
  var file=inp.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wrap=document.getElementById('et-foto-wrap');
    if(wrap) wrap.innerHTML='<img id="et-foto-prev" src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover"/>';
  };
  reader.readAsDataURL(file);
}

async function salvarEdicaoTec(btn){
  var nomeOrig=decodeURIComponent(btn.getAttribute('data-nome'));
  var t=_ofiTecsData[nomeOrig]; if(!t) return;
  var novoNome=(document.getElementById('et-nome').value||'').trim().toUpperCase();
  if(!novoNome){alert('Nome obrigatório.');return;}
  t.nome=novoNome;
  t.matricula=(document.getElementById('et-mat').value||'').trim();
  t.gestor=(document.getElementById('et-gest').value||'').trim();
  t.nome_nps=(document.getElementById('et-nnps').value||'').trim();
  t.cod_mec=(document.getElementById('et-cmec').value||'').trim();
  t.equipe_mec=(document.getElementById('et-emec').value||'').trim();
  t.cod_alin=(document.getElementById('et-cali').value||'').trim();
  t.equipe_alin=(document.getElementById('et-eali').value||'').trim();
  t.nome_alin=(document.getElementById('et-nali').value||'').trim();
  t.cod_ac=(document.getElementById('et-cac').value||'').trim();
  t.equipe_ac=(document.getElementById('et-eac').value||'').trim();
  // Foto
  var fotoEl=document.getElementById('et-foto-prev');
  if(fotoEl&&fotoEl.src&&fotoEl.src.startsWith('data:')) t.foto=fotoEl.src;
  t.ativo=document.getElementById('et-ativ').checked;
  if(novoNome!==nomeOrig){
    _ofiTecsData[novoNome]=t;
    delete _ofiTecsData[nomeOrig];
  }
  closeModal();
  salvarTodosTecs(true);
  showOfiTecs();
}

async function salvarTodosTecs(silencioso){
  await _tecsSave(_ofiTecsData);
  if(!silencioso) alert('✅ '+Object.keys(_ofiTecsData).length+' técnicos salvos!');
}

async function loadMan(){
  var adm=isAdmin(), revIds=revAtivas();
  var selRev=+(document.getElementById('m-rev')&&document.getElementById('m-rev').value||MAN.rev||0);
  MAN.rev=selRev;
  loading('m-tw');

  try{
    // 1. Buscar todos os itens de giro cadastrados (referência)
    var _gRevs2=selRev&&selRev!==0?[selRev]:(adm?UORDER:revIds);
    var giros=[];
    for(var _gri=0;_gri<_gRevs2.length;_gri++){
      var _gQ2=_supa.from('itens_giro').select('*').eq('revenda',_gRevs2[_gri]).order('grupo').order('cod').limit(5000);
      var {data:_gd2,error:_ge2}=await _gQ2;
      if(_ge2) throw _ge2;
      giros=giros.concat(_gd2||[]);
    }
    var eg=null;

    // 2. Buscar estoque por revenda (evita limite 1000/query do Supabase)
    var _mRevs=selRev&&selRev!==0?[selRev]:(adm?UORDER:revIds);
    var est=[];
    for(var _mri=0;_mri<_mRevs.length;_mri++){
      var _mF=0,_mM=true;
      while(_mM){
        var {data:_med,error:_mee}=await _supa.from('estoque').select('*')
          .eq('revenda',_mRevs[_mri]).range(_mF,_mF+899);
        if(_mee) throw _mee;
        var _mc=_med||[]; est=est.concat(_mc);
        if(_mc.length<900)_mM=false; else _mF+=900;
      }
    }
    var ee=null;

    // Índice estoque por revenda+item
    var estIdx={};
    (est||[]).forEach(function(r){ estIdx[r.revenda+'|'+r.item]=r; });

    // Índice giro por revenda+cod
    var giroIdx={};
    (giros||[]).forEach(function(g){ giroIdx[g.revenda+'|'+g.cod]=g; });

    // 3. Montar linhas unificadas:
    //    - Começa pelos itens de giro (sempre aparecem)
    //    - Enriquece com dados de estoque se existir
    //    - Adiciona itens de estoque que NÃO são de giro (para ver tudo)
    var giroKeys=new Set();
    var giroRows=(giros||[]).map(function(g){
      var key=g.revenda+'|'+g.cod;
      giroKeys.add(key);
      var e=estIdx[key]||null;
      // Buscar dados do opcional
      var opcKey=g.cod_opcional?(g.revenda+'|'+g.cod_opcional):null;
      var eOpc=opcKey?estIdx[opcKey]:null;
      return {
        // Dados de estoque (ou zeros se não existir)
        revenda:g.revenda, item:g.cod,
        descricao:e?e.descricao:(g.descricao||g.desc||''),
        abc:e?e.abc:'',
        qtd_contabil:e?(+e.qtd_contabil||0):null,
        qtd_res_oficina:e?(+e.qtd_res_oficina||0):null,
        qtd_negociacao:e?(+e.qtd_negociacao||0):null,
        qtd_alocada:e?(+e.qtd_alocada||0):null,
        qtd_orcada:e?(+e.qtd_orcada||0):null,
        qtd_disponivel:e?(+e.qtd_disponivel||0):null,
        demanda_media:e?(+e.demanda_media||0):null,
        locacao:e?e.locacao:'',
        custo_medio:e?(+e.custo_medio||0):0,
        val_estoque:e?(+e.val_estoque||0):0,
        nome_grupo:g.grupo||'',
        preco_publico:e?(+e.preco_publico||0):0,
        dias:e?(+e.dias||0):null,
        // Flags
        _isGiro:true, _giro:g,
        _semEstoque:!e,
        _opcCode:g.cod_opcional||null,
        _opcDisp:eOpc?(+eOpc.qtd_disponivel||0):null
      };
    });

    // Itens de estoque que não são de giro
    var estoqueRows=(est||[]).filter(function(r){
      return !giroKeys.has(r.revenda+'|'+r.item);
    }).map(function(r){
      return Object.assign({},r,{_isGiro:false,_giro:null,_semEstoque:false,_opcCode:null,_opcDisp:null});
    });

    _manAllRows=giroRows.concat(estoqueRows);

    // Popular grupos dropdown
    var grpSel=document.getElementById('m-grp');
    if(grpSel&&grpSel.options.length<=1){
      var grps=[...new Set(_manAllRows.map(function(r){return r.nome_grupo;}).filter(Boolean))].sort();
      grps.forEach(function(g){var o=document.createElement('option');o.value=g;o.textContent=g;grpSel.appendChild(o);});
      if(MAN.grp)grpSel.value=MAN.grp;
    }

    buildManKpis();
    renderManTable();
  }catch(e){
    S('m-tw','<div class="aerr">Erro: '+H(e.message||String(e))+'<br><small>Verifique a conexão com o Supabase.</small></div>');
    console.error(e);
  }
}

function buildManKpis(){
  var rows=_manAllRows;
  var giroRows=rows.filter(function(r){return r._isGiro;});
  var tot=rows.length;
  // Contar códigos únicos de giro (sem duplicar por revenda)
  var _giCods={}; giroRows.forEach(function(r){_giCods[r.item]=1;});
  var totGiro=Object.keys(_giCods).length;
  // Sem Estoque: giro, disp null ou zero
  var semEstoque=giroRows.filter(function(r){
    return r.qtd_disponivel===null||(+r.qtd_disponivel||0)<=0;
  }).length;
  // Comprar: giro, 0 < disp < est_min
  var comprar=giroRows.filter(function(r){
    var dp=+r.qtd_disponivel||0; var em=r._giro?r._giro.est_min:0;
    return r.qtd_disponivel!==null&&dp>0&&dp<em&&em>0;
  }).length;
  // Repor: giro, est_min <= disp < demanda
  var repor=giroRows.filter(function(r){
    var dp=+r.qtd_disponivel||0; var dem2=+r.demanda_media||0;
    var em=r._giro?r._giro.est_min:0;
    return r.qtd_disponivel!==null&&dp>0&&dp>=em&&dp<dem2&&dem2>0;
  }).length;
  var zero_giro=semEstoque; // alias para compatibilidade
  // Sem estoque geral
  var zero=rows.filter(function(r){return r.qtd_disponivel!==null&&(+r.qtd_disponivel||0)===0&&(+r.demanda_media||0)>0;}).length;
  var low=rows.filter(function(r){return r.qtd_disponivel!==null&&(+r.qtd_disponivel||0)>0&&(+r.qtd_disponivel||0)<(+r.demanda_media||0)&&(+r.demanda_media||0)>0;}).length;
  var par=rows.filter(function(r){return(+r.dias||0)>90&&(+r.qtd_contabil||0)>0;}).length;
  var val=rows.reduce(function(a,r){return a+(+r.val_estoque||0);},0);
  S('m-kpis',
    // ── Filtro principal encarregado ──
    '<div class="kpi clickable'+(MAN.filtro==='solicitacao'?' active':'')+'" id="kpi-solicit" onclick="setManFiltro(\'solicitacao\')" style="'+(MAN.filtro==='solicitacao'?'border-color:var(--red);background:#fff5f5;':'')+'">'+
      '<div class="v" style="color:var(--red);font-size:18px">'+fmtN(semEstoque+comprar+repor)+'</div>'
      +'<div class="l" style="font-weight:700">🛒 Solicitação de Compra</div></div>'+
    // ── Filtros detalhados ──
    '<div class="kpi clickable'+(MAN.filtro==='zero_giro'?' active':'')+'" id="kpi-zero-giro" onclick="setManFiltro(\'zero_giro\')">'+
      '<div class="v" style="color:var(--red)">'+fmtN(semEstoque)+'</div><div class="l">⚪ Sem Estoque</div></div>'+
    '<div class="kpi clickable'+(MAN.filtro==='comprar'?' active':'')+'" id="kpi-comprar" onclick="setManFiltro(\'comprar\')">'+
      '<div class="v" style="color:var(--red)">'+fmtN(comprar)+'</div><div class="l">🛒 Comprar</div></div>'+
    '<div class="kpi clickable'+(MAN.filtro==='repor'?' active':'')+'" id="kpi-repor" onclick="setManFiltro(\'repor\')">'+
      '<div class="v" style="color:var(--orange)">'+fmtN(repor)+'</div><div class="l">🔁 Repor</div></div>'+
    '<div class="kpi clickable'+(MAN.filtro==='giro'?' active':'')+'" id="kpi-giro" onclick="setManFiltro(\'giro\')">'+
      '<div class="v" style="color:#1565c0">'+fmtN(totGiro)+'</div><div class="l">📋 Todos Giro</div></div>'+
    // ── Filtros gerais ──
    '<div class="kpi clickable'+(MAN.filtro==='zero'?' active':'')+'" id="kpi-zero" onclick="setManFiltro(\'zero\')">'+
      '<div class="v" style="color:var(--red)">'+fmtN(zero)+'</div><div class="l">Disp. zero c/demanda</div></div>'+
    '<div class="kpi clickable'+(MAN.filtro==='low'?' active':'')+'" id="kpi-low" onclick="setManFiltro(\'low\')">'+
      '<div class="v" style="color:var(--orange)">'+fmtN(low)+'</div><div class="l">Abaixo demanda</div></div>'+
    '<div class="kpi clickable'+(MAN.filtro==='parado'?' active':'')+'" id="kpi-parado" onclick="setManFiltro(\'parado\')">'+
      '<div class="v" style="color:var(--orange)">'+fmtN(par)+'</div><div class="l">Parados +90d</div></div>'+
    '<div class="kpi clickable'+(MAN.filtro==='all'?' active':'')+'" id="kpi-all" onclick="setManFiltro(\'all\')">'+
      '<div class="v">'+fmtN(tot)+'</div><div class="l">Total itens</div></div>'+
    '<div class="kpi"><div class="v" style="font-size:14px">'+fmt(val)+'</div><div class="l">Valor em estoque</div></div>');
}

function setManFiltro(filtro){
  MAN.filtro=filtro;
  var sel=document.getElementById('m-filt'); if(sel)sel.value=filtro;
  buildManKpis();
  renderManTable();
}

function renderManTable(){
  var filtro=MAN.filtro||'all';
  var busca=(MAN.busca||'').toLowerCase().trim();
  var grpF=(MAN.grp||'').trim();
  var abcF=(MAN.abc||'').trim();

  // Atualizar título
  var titulos={
    all:'Todos os itens',giro:'📋 Itens de Giro cadastrados',
    solicitacao:'🛒 Solicitação de Compra (todos os giro c/ necessidade)',zero_giro:'⚪ Sem Estoque — Disp. null/zero (Giro)',comprar:'🛒 Comprar — 0 < Disp. < Est. Mín. (Giro)',repor:'🔁 Repor — Est. Mín. ≤ Disp. < Demanda (Giro)',zero:'Disp. zero c/demanda (todos)',
    low:'Abaixo da demanda mensal',parado:'Parados há mais de 90 dias'
  };
  S('m-tit',titulos[filtro]||'Itens de Estoque');

  var filtered=_manAllRows.filter(function(r){
    // Filtro principal
    var dp=r.qtd_disponivel, dem=+r.demanda_media||0, em=r._giro?r._giro.est_min:0;
    if(filtro==='giro') {if(!r._isGiro) return false;}
    else if(filtro==='solicitacao'){
      if(!r._isGiro) return false;
      var dpS=dp===null?null:(+dp||0);
      var emS=r._giro?r._giro.est_min:0;
      var demS=+r.demanda_media||0;
      if(dpS===null) return true;        // sem dado = urgente
      if(dpS<=0) return true;             // disp zero = urgente
      if(dpS>0&&dpS<emS&&emS>0) return true;  // abaixo est min
      if(dpS>0&&dpS<demS&&demS>0) return true; // abaixo demanda
      return false;
    }
    else if(filtro==='urgent'||filtro==='zero_giro'){
      // Sem Estoque: giro com disp null, zero ou negativo
      if(!r._isGiro) return false;
      if(dp!==null&&(+dp||0)>0) return false;
    }
    else if(filtro==='comprar'){
      // 0 < disp < est_min
      if(!r._isGiro||dp===null) return false;
      var dpC=+dp||0; var emC=r._giro?r._giro.est_min:0;
      if(dpC<=0||emC===0||dpC>=emC) return false;
    }
    else if(filtro==='repor'){
      // est_min <= disp < demanda
      if(!r._isGiro||dp===null) return false;
      var dpR=+dp||0; var demR=+r.demanda_media||0; var emR=r._giro?r._giro.est_min:0;
      if(dpR<=0||demR===0||dpR>=demR||dpR<emR) return false;
    }
    else if(filtro==='zero'){if(dp===null||dp!==0||dem===0) return false;}
    else if(filtro==='low'){if(dp===null||dp<=0||dp>=dem||dem===0) return false;}
    else if(filtro==='parado'){if((+r.dias||0)<=90||(+r.qtd_contabil||0)===0) return false;}
    // Filtros secundários
    if(grpF&&r.nome_grupo!==grpF) return false;
    if(abcF&&r.abc!==abcF) return false;
    if(busca&&!r.item.toLowerCase().includes(busca)&&!(r.descricao||'').toLowerCase().includes(busca)) return false;
    return true;
  });

  _manRows=filtered;
  var adm=isAdmin(), selRev=MAN.rev;
  var isMulti=adm&&(!selRev||selRev===0);
  var tw=document.getElementById('m-tw'); if(!tw)return;

  if(!filtered.length){
    tw.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted)">Nenhum item encontrado para este filtro.</div>';
    return;
  }

  // Cabeçalho do filtro ativo
  var infoBar='<div style="padding:6px 10px;background:'+(filtro==='giro'?'#e3f2fd':filtro==='urgent'?'#ffebee':filtro==='zero'?'#ffebee':filtro==='low'?'#fff3e0':'#f5f5f5')+';border-bottom:1px solid #e0e0e0;font-size:11px;color:#555">'+
    '<strong>'+filtered.length+'</strong> iten(s) '+(filtro!=='all'?'com filtro: <strong>'+(titulos[filtro]||filtro)+'</strong>':'no total')+
    '</div>';

  // Ordenar antes de renderizar
  filtered.sort(function(a,b){
    var av=_manSC==='_estMin'?(a._giro?a._giro.est_min:0):a[_manSC];
    var bv=_manSC==='_estMin'?(b._giro?b._giro.est_min:0):b[_manSC];
    if(av===null||av===undefined)av=''; if(bv===null||bv===undefined)bv='';
    if(typeof av==='string')return _manSD*String(av).localeCompare(String(bv));
    return _manSD*((+av||0)-(+bv||0));
  });
  // Ordenar ANTES de renderizar (fora da concatenação)
  filtered.sort(function(a,b){
    var av=_manSC==='_estMin'?(a._giro?a._giro.est_min:0):a[_manSC];
    var bv=_manSC==='_estMin'?(b._giro?b._giro.est_min:0):b[_manSC];
    if(av===null||av===undefined)av=''; if(bv===null||bv===undefined)bv='';
    if(typeof av==='string')return _manSD*String(av).localeCompare(String(bv));
    return _manSD*((+av||0)-(+bv||0));
  });
  var _manLinhas=filtered.slice(0,800).map(function(r){
      var dp=r.qtd_disponivel, dem=+r.demanda_media||0;
      var estMin=r._giro?r._giro.est_min:0;
      var dpNum=dp!==null?+dp:null;
      var dc=dpNum===null?'#aaa':dpNum===0&&dem>0?'var(--red)':dpNum<dem&&dem>0?'var(--orange)':'var(--green)';
      // Sugestão: cobrir até max(est_min, demanda). Só aplica a itens de giro.
      var meta=r._isGiro?Math.max(estMin,Math.ceil(dem)):0;
      var sg=r._isGiro&&dpNum!==null&&dpNum<meta?Math.max(0,meta-dpNum):0;
      var semEst=r._semEstoque;

      var prio;
      if(semEst) prio='<span class="badge bcrit" style="font-size:10px">⚪ Sem Estoque</span>';
      else if(r._isGiro&&dpNum!==null&&dpNum<=0) prio='<span class="badge bcrit">⚪ Sem Estoque</span>';
      else if(r._isGiro&&dpNum!==null&&dpNum<=estMin) prio='<span class="badge bcrit">🔴 Comprar</span>';
      else if(dpNum===0&&dem>0) prio='<span class="badge bcrit">🔴 Zero</span>';
      else if(dpNum!==null&&dpNum<dem&&dem>0) prio='<span class="badge bwarn">🟡 Repor</span>';
      else prio='<span class="badge bok">🟢 OK</span>';

      var opcInfo=r._opcCode?('<code>'+H(r._opcCode)+'</code>'+(r._opcDisp!==null?' <span style="font-size:10px;color:'+(r._opcDisp>0?'var(--green)':'var(--red)')+'">'+fmtN(r._opcDisp)+'</span>':'')):'—';
      var rc=isMulti?'<td><span class="badge bgold">'+rn(r.revenda)+'</span></td>':'';

      return '<tr>'+
        '<td><code>'+H(r.item)+'</code></td>'+
        '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">'+H(r.descricao||'—')+'</td>'+
        rc+
        '<td>'+(r._isGiro?'<span class="badge bok" style="font-size:10px">✓</span>':'')+'</td>'+
        '<td>'+(r.abc?tagABC(r.abc):'<span style="color:#ccc">—</span>')+'</td>'+
        '<td class="num"'+(semEst?' style="color:#ccc"':'')+'>'+(!semEst?fmtN(r.qtd_contabil):'—')+'</td>'+
        '<td class="num"'+(r.qtd_res_oficina>0?' style="color:var(--orange)"':'')+'>'+(!semEst?fmtN(r.qtd_res_oficina):'—')+'</td>'+
        '<td class="num">'+(!semEst?fmtN(r.qtd_alocada):'—')+'</td>'+
        '<td class="num">'+(!semEst?fmtN(r.qtd_orcada):'—')+'</td>'+
        '<td class="num" style="font-weight:700;color:'+dc+';background:#fffbf0">'+
          (semEst?'<span style="color:#ccc;font-size:11px">sem dado</span>':(dpNum!==null?fmtN(dpNum):'—'))+
        '</td>'+
        '<td class="num">'+(r._isGiro?'<strong>'+estMin+'</strong>':'—')+'</td>'+
        '<td class="num">'+(!semEst?fmtN(dem):'—')+'</td>'+
        '<td class="num">'+(!semEst&&r.dias!==null?fmtN(r.dias):'—')+'</td>'+
        '<td class="num">'+(!semEst?fmt(r.custo_medio):'—')+'</td>'+
        '<td class="num" style="color:var(--gold)">'+(!semEst?fmt(r.preco_publico):'—')+'</td>'+
        '<td class="num" style="font-weight:700">'+
          (sg>0?'<span class="badge bcrit">'+sg+' un ≈ '+fmt(sg*(+r.preco_publico||0))+'</span>':'—')+
        '</td>'+
        '<td style="font-size:11px">'+opcInfo+'</td>'+
        '<td>'+prio+'</td></tr>';
    }).join('');
  tw.innerHTML=infoBar+
    '<table><thead><tr>'+
    thM('Código','item')+thM('Descrição','descricao')+(isMulti?'<th>Revenda</th>':'')+
    '<th>Giro</th>'+thM('ABC','abc')+
    thM('Contábil','qtd_contabil','right')+thM('Res.Of.','qtd_res_oficina','right')+
    thM('Alocada','qtd_alocada','right')+thM('Orçada','qtd_orcada','right')+
    thM('Disponível','qtd_disponivel','right')+
    thM('Est.Mín.','_estMin','right')+thM('Demanda/mês','demanda_media','right')+
    thM('Dias','dias','right')+thM('Custo méd.','custo_medio','right')+
    thM('Preço pub.','preco_publico','right')+
    '<th>Sugestão compra</th><th>Opcional</th>'+thM('Prioridade','prioridade')+
    '</tr></thead><tbody>'+
    _manLinhas+
    (filtered.length>800?'<tr><td colspan="18" class="ainfo" style="text-align:center">Mostrando 800 de '+filtered.length+'. Use os filtros para refinar.</td></tr>':'')+
    '</tbody></table>';
}

    return{
