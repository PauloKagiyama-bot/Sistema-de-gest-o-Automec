async function loadDashLevel(){
  var adm=isAdmin(), revIds=revAtivas();
  loading('d-content');
  try{
    var _dashRevs=DRILL.revenda?[DRILL.revenda]:(adm?UORDER:revIds);
    var _dashAll=[];
    for(var _dri=0;_dri<_dashRevs.length;_dri++){
      var _dRv=_dashRevs[_dri],_dF=0,_dM=true;
      while(_dM){
        var _dq=_supa.from('estoque').select('*').eq('revenda',_dRv);
        if(DRILL.grupo) _dq=_dq.eq('nome_grupo',DRILL.grupo);
        _dq=_dq.range(_dF,_dF+899);
        var {data:_dd2,error:_de2}=await _dq;
        if(_de2) throw _de2;
        var _dc=_dd2||[]; _dashAll=_dashAll.concat(_dc);
        if(_dc.length<900)_dM=false; else _dF+=900;
      }
    }
    var data=_dashAll, error=null;
    var all=data||[];

    // KPIs globais (sobre o nível atual)
    var val=all.reduce(function(a,r){return a+(+r.val_estoque||0);},0);
    var par=all.filter(function(r){return r.dias>90&&r.qtd_contabil>0;}).length;
    var sem=all.filter(function(r){return(+r.qtd_disponivel||0)===0&&r.demanda_media>0;}).length;
    var low=all.filter(function(r){return(+r.qtd_disponivel||0)>0&&(+r.qtd_disponivel||0)<(+r.demanda_media||0)&&r.demanda_media>0;}).length;

    S('d-kpis',
      '<div class="kpi clickable'+(DRILL.filtroKpi===null?' active':'')+'" onclick="setDrillKpi(null)">'+
        '<div class="v">'+fmtN(all.length)+'</div><div class="l">Total itens</div></div>'+
      '<div class="kpi clickable'+(DRILL.filtroKpi==='parado'?' active':'')+'" onclick="setDrillKpi(\'parado\')">'+
        '<div class="v" style="color:var(--orange)">'+fmtN(par)+'</div><div class="l">Parados +90d</div></div>'+
      '<div class="kpi clickable'+(DRILL.filtroKpi==='zero'?' active':'')+'" onclick="setDrillKpi(\'zero\')">'+
        '<div class="v" style="color:var(--red)">'+fmtN(sem)+'</div><div class="l">Disp. zero c/demanda</div></div>'+
      '<div class="kpi clickable'+(DRILL.filtroKpi==='low'?' active':'')+'" onclick="setDrillKpi(\'low\')">'+
        '<div class="v" style="color:var(--orange)">'+fmtN(low)+'</div><div class="l">Abaixo demanda</div></div>'+
      '<div class="kpi"><div class="v" style="font-size:14px;color:var(--green)">'+fmt(val)+'</div><div class="l">Valor total</div></div>');

    // Filtrar por KPI se selecionado
    var rows=all;
    if(DRILL.filtroKpi==='parado') rows=all.filter(function(r){return r.dias>90&&r.qtd_contabil>0;});
    else if(DRILL.filtroKpi==='zero') rows=all.filter(function(r){return(+r.qtd_disponivel||0)===0&&r.demanda_media>0;});
    else if(DRILL.filtroKpi==='low') rows=all.filter(function(r){return(+r.qtd_disponivel||0)>0&&(+r.qtd_disponivel||0)<(+r.demanda_media||0);});

    // Breadcrumb do drill
    var path='<span onclick="drillTo(\'resumo\')" class="crumb">📊 Resumo</span>';
    if(DRILL.filtroKpi){var labels={parado:'Parados +90d',zero:'Disp. Zero',low:'Abaixo Demanda'};path+='<span class="sep">·</span><span class="badge bwarn">'+H(labels[DRILL.filtroKpi]||DRILL.filtroKpi)+'</span>';}
    if(DRILL.revenda){path+='<span class="sep">/</span>'+(DRILL.grupo?'<span onclick="drillTo(\'revenda\')" class="crumb">'+rn(DRILL.revenda)+'</span>':'<span class="cur">'+rn(DRILL.revenda)+'</span>');}
    if(DRILL.grupo){path+='<span class="sep">/</span><span class="cur">'+H(DRILL.grupo)+'</span>';}
    var dp=document.getElementById('drill-path');if(dp){dp.style.display='flex';dp.innerHTML=path;}

    var dc=document.getElementById('d-content'); if(!dc)return;

    if(DRILL.level==='resumo'){
      // Por revenda
      var byRev={};
      rows.forEach(function(r){
        if(!byRev[r.revenda])byRev[r.revenda]={rev:r.revenda,itens:0,val:0,par:0,sem:0};
        byRev[r.revenda].itens++;byRev[r.revenda].val+=+r.val_estoque||0;
        if(r.dias>90&&r.qtd_contabil>0)byRev[r.revenda].par++;
        if((+r.qtd_disponivel||0)===0&&r.demanda_media>0)byRev[r.revenda].sem++;
      });
      dc.innerHTML='<div class="card"><div class="ctit">Por Revenda — clique para detalhar</div>'+
        '<div class="tw"><table><thead><tr>'+
        '<th>Revenda</th><th>Itens'+(DRILL.filtroKpi?' (filtrado)':'')+'</th>'+
        '<th>Parados +90d</th><th>Disp. zero c/demanda</th><th>Valor total</th><th>Status</th></tr></thead><tbody>'+
        Object.values(byRev).sort(function(a,b){return a.rev-b.rev;}).map(function(r){
          var pct=r.itens?Math.round(r.par/r.itens*100):0;
          var st=pct>60?'<span class="badge bcrit">Crítico</span>':pct>40?'<span class="badge bwarn">Atenção</span>':'<span class="badge bok">OK</span>';
          return '<tr style="cursor:pointer" onclick="drillTo(\'revenda\','+r.rev+')">'+
            '<td><strong>'+rn(r.rev)+'</strong></td><td class="num">'+fmtN(r.itens)+'</td>'+
            '<td class="num" style="color:var(--orange)">'+fmtN(r.par)+' ('+pct+'%)</td>'+
            '<td class="num" style="color:var(--red)">'+fmtN(r.sem)+'</td>'+
            '<td class="num">'+fmt(r.val)+'</td><td>'+st+'</td></tr>';
        }).join('')+'</tbody></table></div></div>';
    }else if(DRILL.level==='revenda'){
      var byGrp={};
      rows.forEach(function(r){
        var g=r.nome_grupo||'Sem grupo';
        if(!byGrp[g])byGrp[g]={grupo:g,itens:0,val:0,par:0,sem:0};
        byGrp[g].itens++;byGrp[g].val+=+r.val_estoque||0;
        if(r.dias>90&&r.qtd_contabil>0)byGrp[g].par++;
        if((+r.qtd_disponivel||0)===0&&r.demanda_media>0)byGrp[g].sem++;
      });
      dc.innerHTML='<div class="card"><div class="ctit">'+rn(DRILL.revenda)+' — Por Grupo — clique para ver itens</div>'+
        '<div class="tw"><table><thead><tr>'+
        '<th>Grupo</th><th>Itens</th><th>Parados +90d</th><th>Disp. zero</th><th>Valor total</th></tr></thead><tbody>'+
        Object.values(byGrp).sort(function(a,b){return b.val-a.val;}).map(function(r){
          var g2=r.grupo.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return '<tr style="cursor:pointer" onclick="drillTo(\'grupo\',null,\''+g2+'\')">'+
            '<td><strong>'+H(r.grupo)+'</strong></td><td class="num">'+fmtN(r.itens)+'</td>'+
            '<td class="num" style="color:var(--orange)">'+fmtN(r.par)+'</td>'+
            '<td class="num" style="color:var(--red)">'+fmtN(r.sem)+'</td>'+
            '<td class="num">'+fmt(r.val)+'</td></tr>';
        }).join('')+'</tbody></table></div></div>';
    }else{
      dc.innerHTML='<div class="card"><div class="ctit">'+H(DRILL.grupo)+' — '+rn(DRILL.revenda)+' — Linha a linha</div>'+
        '<div class="tw"><table><thead><tr>'+
        thD('Código','item')+thD('Descrição','descricao')+thD('ABC','abc')+
        thD('Contábil','qtd_contabil','right')+thD('Disponível','qtd_disponivel','right')+
        thD('Res.Of.','qtd_res_oficina','right')+thD('Alocada','qtd_alocada','right')+
        thD('Demanda/mês','demanda_media','right')+thD('Dias','dias','right')+
        thD('Custo méd.','custo_medio','right')+thD('Valor est.','val_estoque','right')+'<th>Locação</th>'+
        '</tr></thead><tbody>'+
        (_dashRows=rows,rows).map(function(r){
          var dp2=+r.qtd_disponivel||0;
          var dc2=dp2===0&&r.demanda_media>0?'var(--red)':dp2<r.demanda_media&&r.demanda_media>0?'var(--orange)':'var(--green)';
          return '<tr><td><code>'+H(r.item)+'</code></td>'+
            '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">'+H(r.descricao)+'</td>'+
            '<td>'+tagABC(r.abc)+'</td><td class="num">'+fmtN(r.qtd_contabil)+'</td>'+
            '<td class="num" style="font-weight:700;color:'+dc2+';background:#fffbf0">'+fmtN(dp2)+'</td>'+
            '<td class="num"'+(r.qtd_res_oficina>0?' style="color:var(--orange)"':'')+'>'+fmtN(r.qtd_res_oficina)+'</td>'+
            '<td class="num">'+fmtN(r.qtd_alocada)+'</td>'+
            '<td class="num">'+fmtN(r.demanda_media)+'</td><td class="num">'+fmtN(r.dias)+'</td>'+
            '<td class="num">'+fmt(r.custo_medio)+'</td><td class="num">'+fmt(r.val_estoque)+'</td>'+
            '<td style="font-size:11px">'+H(r.locacao||'—')+'</td></tr>';
        }).join('')+'</tbody></table></div></div>';
    }
  }catch(e){S('d-content','<div class="aerr">Erro: '+H(e.message||String(e))+'</div>');}
}
function setDrillKpi(kpi){
  DRILL.filtroKpi=kpi;
  loadDashLevel();
}
function drillTo(level,revenda,grupo){
  DRILL.level=level;
  if(revenda!==undefined&&revenda!==null)DRILL.revenda=revenda;
  if(grupo!==undefined&&grupo!==null)DRILL.grupo=grupo;
  if(level==='resumo'){DRILL.revenda=null;DRILL.grupo=null;}
  if(level==='revenda')DRILL.grupo=null;
  loadDashLevel();
}

function cfgAba(aba){
  _cfgAba=aba;
  // Destacar aba ativa
  ['u','f','n','m'].forEach(function(k){
    var el=document.getElementById('cfa-'+k);
    if(el) el.style.background=k===aba[0]?'var(--gold)':'';
  });
  var map={u:'usuarios',f:'funcoes',n:'unidades',m:'modulos',o:'oficina',p:'periodo',i:'importacao'};
  Object.keys(map).forEach(function(k){
    var el=document.getElementById('cfa-'+k);
    if(el) el.style.background=map[k]===aba?'var(--gold)':'';
    if(el) el.style.color=map[k]===aba?'#000':'';
  });
  if(aba==='usuarios') cfgUsuarios();
  else if(aba==='funcoes') cfgFuncoes();
  else if(aba==='unidades') cfgUnidades();
  else if(aba==='modulos') cfgModulos();
  else if(aba==='oficina') cfgOficina();
  else if(aba==='periodo') cfgPeriodoComissao();
  else if(aba==='importacao') cfgImportacao();
}

    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">'+

      return'<div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;cursor:pointer" onclick="expandirAgg(\''+tipo+'\',\''+item.cod+'\')">'+

        '</div>'+
        '<div id="agg-exp-'+tipo+'-'+item.cod.replace(/[^a-z0-9]/gi,'_')+'" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0">'+
        '<div style="font-size:11px;color:#888;margin-bottom:6px">Códigos alternativos (convertidos para <strong>'+item.cod+'</strong>):</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:4px" id="alts-'+tipo+'-'+item.cod.replace(/[^a-z0-9]/gi,'_')+'">'+
        (item.alts||[]).map(function(a){
          return'<span style="background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:2px 8px;font-size:12px">'+
            H(a)+
            '<button onclick="removerAlt(\''+tipo+'\',\''+item.cod+'\',\''+a+'\',event)" style="margin-left:4px;background:none;border:none;color:#e53935;cursor:pointer;font-size:11px">✕</button>'+

        }).join('')+

        '<div style="display:flex;gap:6px;margin-top:8px">'+
        '<input id="new-alt-'+tipo+'-'+item.cod.replace(/[^a-z0-9]/gi,'_')+'" placeholder="Novo código alternativo..." style="flex:1;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:12px"/>'+
        '<button onclick="adicionarAlt(\''+tipo+'\',\''+item.cod+'\')" style="padding:6px 12px;background:'+cor+';color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">+ Adicionar</button>'+
        '<button onclick="excluirAgg(\''+tipo+'\',\''+item.cod+'\',event)" style="padding:6px 10px;background:#ffebee;color:#c62828;border:1px solid #ef9a9a;border-radius:4px;cursor:pointer;font-size:12px">🗑️</button>'+

function expandirAgg(tipo, cod){
  var id='agg-exp-'+tipo+'-'+cod.replace(/[^a-z0-9]/gi,'_');
  var el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

function modalNovoAgg(tipo){
  modal('Novo código — '+(tipo==='agg10'?'Agregados 10%':'Agregados 4%'),
    '<div class="fg"><label>Código principal *</label><input id="na-cod" placeholder="Ex: 1503M"/></div>'+
    '<div class="fg"><label>Descrição *</label><input id="na-desc" placeholder="Ex: ARMOX TREATMENT"/></div>'+
    '<div style="display:flex;gap:8px;margin-top:1rem">'+
    '<button class="btn bgld" onclick="salvarNovoAgg(\''+tipo+'\')">💾 Salvar</button>'+
    '<button class="btn" onclick="closeModal()">Cancelar</button></div>');
}

async function salvarNovoAgg(tipo){
  var cod=(document.getElementById('na-cod').value||'').trim().toUpperCase();
  var desc=(document.getElementById('na-desc').value||'').trim().toUpperCase();
  if(!cod||!desc){alert('Preencha código e descrição.');return;}
  var saved=_cfgOfiData||{};
  var data=Object.assign({},CFG_OFICINA_DEFAULTS,saved);
  if(!data[tipo]) data[tipo]=[];
  if(data[tipo].find(function(x){return x.cod===cod;})){alert('Código já existe.');return;}
  data[tipo].push({cod:cod,desc:desc,alts:[]});
  _cfgOfiData=data; await _cfgSet('cfg_oficina',data);
  closeModal();
  cfgOfiAba(tipo);
}

async function adicionarAlt(tipo, cod){
  var key='new-alt-'+tipo+'-'+cod.replace(/[^a-z0-9]/gi,'_');
  var inp=document.getElementById(key);
  if(!inp) return;
  var alt=inp.value.trim().toUpperCase();
  if(!alt){alert('Digite o código alternativo.');return;}
  var saved=_cfgOfiData||{};
  var data=Object.assign({},CFG_OFICINA_DEFAULTS,saved);
  var item=(data[tipo]||[]).find(function(x){return x.cod===cod;});
  if(!item){alert('Código principal não encontrado.');return;}
  if(!item.alts) item.alts=[];
  if(item.alts.indexOf(alt)>=0){alert('Código já cadastrado.');return;}
  item.alts.push(alt);
  inp.value='';
  _cfgOfiData=data; await _cfgSet('cfg_oficina',data);
  CFG_OFICINA_DEFAULTS=Object.assign({},CFG_OFICINA_DEFAULTS,data);
  cfgOfiAba(tipo);
}

async function removerAlt(tipo, cod, alt, evt){
  evt.stopPropagation();
  if(!confirm('Remover código "'+alt+'"?')) return;
  var saved=_cfgOfiData||{};
  var data=Object.assign({},CFG_OFICINA_DEFAULTS,saved);
  var item=(data[tipo]||[]).find(function(x){return x.cod===cod;});
  if(item&&item.alts) item.alts=item.alts.filter(function(a){return a!==alt;});
  _cfgOfiData=data; await _cfgSet('cfg_oficina',data);
  cfgOfiAba(tipo);
}

async function excluirAgg(tipo, cod, evt){
  evt.stopPropagation();
  if(!confirm('Excluir código "'+cod+'" e todos seus alternativos?')) return;
  var saved=_cfgOfiData||{};
  var data=Object.assign({},CFG_OFICINA_DEFAULTS,saved);
  data[tipo]=(data[tipo]||[]).filter(function(x){return x.cod!==cod;});
  _cfgOfiData=data; await _cfgSet('cfg_oficina',data);
  cfgOfiAba(tipo);
}

async function salvarNovaPolitica(cat){
  var info=POL_CATS[cat];
  var cod=(document.getElementById('np-cod').value||'').trim().toUpperCase();
  if(!cod){var err=document.getElementById('np-err');err.textContent='Informe o código da política.';err.style.display='block';return;}

  var saved=_cfgOfiData||{};
  var data=Object.assign({},CFG_OFICINA_DEFAULTS,saved);
  var arr=(data[info.key]||[]).slice();

  if(arr.find(function(x){return x.politica===cod;})){
    var err2=document.getElementById('np-err');err2.textContent='Já existe uma política com este código.';err2.style.display='block';return;
  }

  var novasLinhas=_lerLinhasModal(info.tipo,cod);
  if(!novasLinhas.length){var err3=document.getElementById('np-err');err3.textContent='Adicione ao menos uma faixa.';err3.style.display='block';return;}

  data[info.key]=arr.concat(novasLinhas);
  _cfgOfiData=data; await _cfgSet('cfg_oficina',data);
  closeModal(); cfgOfiAba('pol');
}

function _lerLinhasModal(tipo,cod){
  var linhas=[];
  if(tipo==='pct_pol'){
    var pctEl=document.querySelector('#np-rows .np-pct');
    if(pctEl) linhas.push({politica:cod,pct:(parseFloat(pctEl.value)||0)/100});
    return linhas;
  }
  document.querySelectorAll('#np-rows [data-row]').forEach(function(rowEl){
    if(tipo==='faixa_pol_valor'){
      var fmin=parseFloat(rowEl.querySelector('.np-fmin').value);
      var valor=parseFloat(rowEl.querySelector('.np-valor').value);
      if(!isNaN(fmin)&&!isNaN(valor)) linhas.push({politica:cod,fat_min:fmin,valor:valor});
    } else {
      var fmin2=parseFloat(rowEl.querySelector('.np-fmin').value);
      var fmaxRaw=rowEl.querySelector('.np-fmax').value;
      var fmax=fmaxRaw===''?null:parseFloat(fmaxRaw);
      var pct=parseFloat(rowEl.querySelector('.np-pct').value);
      if(!isNaN(fmin2)&&!isNaN(pct)) linhas.push({politica:cod,fat_min:fmin2,fat_max:(isNaN(fmax)?null:fmax),pct:pct/100});
    }
  });
  return linhas;
}

    '<div id="np-err" class="aerr" style="display:none"></div>');
}

async function salvarEdicaoPolitica(cat,polOriginal){
  var info=POL_CATS[cat];
  var novoCod=(document.getElementById('np-cod').value||'').trim().toUpperCase();
  if(!novoCod){var err=document.getElementById('np-err');err.textContent='Informe o código da política.';err.style.display='block';return;}

  var saved=_cfgOfiData||{};
  var data=Object.assign({},CFG_OFICINA_DEFAULTS,saved);
  var arr=(data[info.key]||[]).filter(function(e){return e.politica!==polOriginal;});

  if(novoCod!==polOriginal && arr.find(function(x){return x.politica===novoCod;})){
    var err2=document.getElementById('np-err');err2.textContent='Já existe uma política com este código.';err2.style.display='block';return;
  }

  var novasLinhas=_lerLinhasModal(info.tipo,novoCod);
  if(!novasLinhas.length){var err3=document.getElementById('np-err');err3.textContent='Adicione ao menos uma faixa.';err3.style.display='block';return;}

  data[info.key]=arr.concat(novasLinhas);
  _cfgOfiData=data; await _cfgSet('cfg_oficina',data);
  closeModal(); cfgOfiAba('pol');
}

var POL_UNI_KEY={tec:'tec',ali:'ali',fun:'fun',frot:'fro'};

async function excluirPolitica(cat,pol){
  var info=POL_CATS[cat];
  var uniKey=POL_UNI_KEY[cat];
  var uniPols=_cfgUniPolsData||(await _cfgGet('cfg_uni_pols'))||{};
  _cfgUniPolsData=uniPols;

  var usadoEm=[];
  if(uniKey){
    Object.keys(uniPols).forEach(function(revId){
      if(uniPols[revId]&&uniPols[revId][uniKey]===pol) usadoEm.push(rn(+revId));
    });
  }

  var msg='Excluir a política "'+pol+'" e todas as suas faixas?';
  if(usadoEm.length){
    msg+='\n\n⚠️ ATENÇÃO: esta política está em uso em: '+usadoEm.join(', ')+
      '.\nAs unidades acima ficarão SEM política até você atribuir outra em "Políticas por Unidade".\n\nDeseja continuar mesmo assim?';
  }
  if(!confirm(msg)) return;

  var saved=_cfgOfiData||{};
  var data=Object.assign({},CFG_OFICINA_DEFAULTS,saved);
  data[info.key]=(data[info.key]||[]).filter(function(e){return e.politica!==pol;});
  _cfgOfiData=data; await _cfgSet('cfg_oficina',data);

  // Remover referências em "Políticas por Unidade"
  if(usadoEm.length&&uniKey){
    Object.keys(uniPols).forEach(function(revId){
      if(uniPols[revId]&&uniPols[revId][uniKey]===pol) delete uniPols[revId][uniKey];
    });
    _cfgUniPolsData=uniPols; await _cfgSet('cfg_uni_pols',uniPols);
  }

  cfgOfiAba('pol');
}

// Renderiza os checkboxes de módulos/submódulos agrupados por módulo
function _modCheckboxesHtml(selecionados){
  selecionados=selecionados||[];
  return Object.keys(MODULES_TREE).map(function(modKey){
    var mod=MODULES_TREE[modKey];
    var subKeys=Object.keys(mod.sub||{});

    if(!subKeys.length){
      var chk=selecionados.indexOf(modKey)>=0?' checked':'';
      return'<div style="border:1px solid #e5e5e5;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafafa">'+
        '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:700;font-size:13px">'+
        '<input type="checkbox" class="fn-mod" value="'+modKey+'"'+chk+'> '+mod.icon+' '+mod.nome+'</label></div>';
    }

    var todasMarcadas=subKeys.every(function(subKey){return selecionados.indexOf(modKey+'.'+subKey)>=0;});
    var subsHtml=subKeys.map(function(subKey){
      var sub=mod.sub[subKey];
      var full=modKey+'.'+subKey;
      var chk=selecionados.indexOf(full)>=0?' checked':'';
      return'<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;padding:4px 6px;border-radius:4px" '+
        'onmouseover="this.style.background=\'#eee\'" onmouseout="this.style.background=\'\'">'+
        '<input type="checkbox" class="fn-mod fn-sub-'+modKey+'" value="'+full+'"'+chk+' onchange="_modUpdateHeader(\''+modKey+'\')"> '+sub.icon+' '+sub.nome+'</label>';
    }).join('');

    return'<div style="border:1px solid #e5e5e5;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafafa">'+
      '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:700;font-size:13px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #e5e5e5">'+
      '<input type="checkbox" id="fn-hdr-'+modKey+'"'+(todasMarcadas?' checked':'')+' onchange="_modToggleAll(\''+modKey+'\',this.checked)"> '+mod.icon+' '+mod.nome+
      ' <span style="font-weight:400;color:var(--muted);font-size:11px">(marcar todos)</span></label>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:2px 10px;padding-left:1.6rem">'+subsHtml+'</div></div>';
  }).join('');
}

// Marca/desmarca todos os submódulos de um módulo
function _modToggleAll(modKey,checked){
  document.querySelectorAll('.fn-sub-'+modKey).forEach(function(el){el.checked=checked;});
}

// Atualiza o checkbox "marcar todos" do cabeçalho conforme os submódulos
function _modUpdateHeader(modKey){
  var subs=document.querySelectorAll('.fn-sub-'+modKey);
  var hdr=document.getElementById('fn-hdr-'+modKey);
  if(!hdr) return;
  hdr.checked=Array.prototype.every.call(subs,function(el){return el.checked;});
}

async function salvarFuncao(id){
  var nome=(document.getElementById('fn-nome').value||'').trim();
  var perfil=document.getElementById('fn-perfil').value;
  if(!nome){var e=document.getElementById('fn-err');if(e){e.style.display='block';e.textContent='Nome obrigatório.';}return;}
  var criar=[].slice.call(document.querySelectorAll('.fn-criar:checked')).map(function(c){return c.value;});
  var mods=[].slice.call(document.querySelectorAll('.fn-mod:checked')).map(function(c){return c.value;});
  if(id){
    var f=_cfgFuncoes.find(function(x){return x.id===id;});
    if(f){f.nome=nome;f.perfil=perfil;f.podecriar=criar;f.modulos=mods;}
  } else {
    var newId=Math.max.apply(null,_cfgFuncoes.map(function(x){return x.id;}))+1;
    _cfgFuncoes.push({id:newId,nome:nome,perfil:perfil,podecriar:criar,modulos:mods});
  }
  await _cfgSet('cfg_funcoes',_cfgFuncoes);
  closeModal();
  renderCfgFuncoes();
}

async function delFuncao(id){
  if(!confirm('Excluir esta função?')) return;
  _cfgFuncoes=_cfgFuncoes.filter(function(f){return f.id!==id;});
  await _cfgSet('cfg_funcoes',_cfgFuncoes);
  renderCfgFuncoes();
}

function cfgModulos(){
  // Para cada módulo/submódulo, lista as funções que têm acesso
  // (acesso ao módulo "pai" sem sub é direto pela chave; submódulos usam 'modulo.sub')
  var linhas='';
  Object.keys(MODULES_TREE).forEach(function(modKey){
    var mod=MODULES_TREE[modKey];
    var subKeys=Object.keys(mod.sub||{});

    if(!subKeys.length){
      var funcsComAcesso=_cfgFuncoes.filter(function(f){return(f.modulos||[]).indexOf(modKey)>=0;}).map(function(f){return f.nome;});
      linhas+='<tr style="background:#fffbf0">'+
        '<td>'+mod.icon+' <strong>'+H(mod.nome)+'</strong></td>'+
        '<td style="color:var(--muted);font-size:12px">'+H(mod.desc)+'</td>'+

          '<span style="color:var(--muted)">Nenhuma</span>')+'</td>'+
        '<td><button class="btn bsm bgld" onclick="cfgAba(\'funcoes\')">✏️ Editar via Funções</button></td>'+
        '</tr>';
      return;
    }

    // Linha de cabeçalho do módulo (apenas título, sem permissão própria)
    linhas+='<tr style="background:#f5f5f5">'+
      '<td colspan="4" style="font-weight:700;padding-top:14px">'+mod.icon+' '+H(mod.nome)+
      ' <span style="color:var(--muted);font-weight:400;font-size:12px">— '+H(mod.desc)+'</span></td></tr>';

    subKeys.forEach(function(subKey){
      var sub=mod.sub[subKey];
      var full=modKey+'.'+subKey;
      var funcsComAcesso=_cfgFuncoes.filter(function(f){return(f.modulos||[]).indexOf(full)>=0;}).map(function(f){return f.nome;});
      linhas+='<tr>'+
        '<td style="padding-left:1.6rem">'+sub.icon+' '+H(sub.nome)+'</td>'+
        '<td style="color:var(--muted);font-size:12px">'+H(sub.desc)+'</td>'+
        '<td>'+(funcsComAcesso.length?
          funcsComAcesso.map(function(n){return'<span class="badge binfo" style="font-size:10px">'+H(n)+'</span>';}).join(' '):
          '<span style="color:var(--muted)">Nenhuma</span>')+'</td>'+
        '<td><button class="btn bsm bgld" onclick="cfgAba(\'funcoes\')">✏️ Editar via Funções</button></td>'+
        '</tr>';
    });
  });

  S('cfg-content',
    '<div style="margin-bottom:12px;font-weight:700;font-size:15px">📦 Módulos do Sistema</div>'+
    '<p style="color:var(--muted);font-size:12px;margin-bottom:12px">'+
    'O acesso a cada módulo/submódulo é controlado pelas Funções/Cargos. Edite uma função para alterar suas permissões. '+
    'Novos módulos e submódulos aparecem aqui automaticamente.</p>'+
    '<div class="tw"><table><thead><tr>'+
    '<th>Módulo / Submódulo</th><th>Descrição</th><th>Funções com acesso</th><th>Ações</th>'+
    '</tr></thead><tbody>'+linhas+'</tbody></table></div>');
}

async function salvarUser(id){
  var nome=document.getElementById('cu-n').value.trim();
  var func=document.getElementById('cu-f').value.trim();
  var login=document.getElementById('cu-l')&&document.getElementById('cu-l').value.trim();
  var senha=document.getElementById('cu-s').value;
  var perfil=document.getElementById('cu-p').value;
  if(!nome){var e=document.getElementById('cu-err');if(e){e.style.display='block';e.textContent='Nome obrigatório.';}return;}
  var revs=JSON.stringify(perfil==='admin'?['*']:[...document.querySelectorAll('input[name="ur"]:checked')].map(function(x){return+x.value;}));
  var emailEl=document.getElementById('cu-email');
  var emailVal=emailEl?(emailEl.value||'').trim():'';
  // Email salvo na funcao temporariamente até coluna ser criada no Supabase
  // Para usar email: adicionar coluna 'email' na tabela usuarios no Supabase
  var pl={nome:nome,funcao:func,perfil:perfil,revendas:revs,email:emailVal};
  if(senha)pl.senha=senha;
  // Guardar email localmente para uso no envio
  // email salvo no payload
  var res;
  if(id){res=await _supa.from('usuarios').update(pl).eq('id',id);}
  else{
    if(!login||!senha){var e=document.getElementById('cu-err');if(e){e.style.display='block';e.textContent='Login e senha obrigatórios.';}return;}
    if(UORDER.indexOf(+login)>=0){/* ok */}
    res=await _supa.from('usuarios').insert(Object.assign({login:login,ativo:true},pl));
  }
  if(res&&res.error){var e=document.getElementById('cu-err');if(e){e.style.display='block';e.textContent='Erro: '+(res.error.message||String(res.error));}return;}
  closeModal();showConfig();
}

// HELPER: calcular período de comissão (25 ao 24)
// ══════════════════════════════════════════════════════════════════════════════
function _periodoComissao(refDate){
  // refDate: Date de referência (default: hoje)
  // Retorna {dtIni, dtFim, label} para o período 25-24 que contém refDate
  var d = refDate || new Date();
  var ano = d.getFullYear(), mes = d.getMonth()+1, dia = d.getDate();
  // Se dia <= 24: período é dia 25 do mês anterior até dia 24 do mês atual
  // Se dia >= 25: período é dia 25 do mês atual até dia 24 do próximo mês
  var iniAno, iniMes, fimAno, fimMes;
  if(dia <= 24){
    iniMes = mes - 1; iniAno = ano;
    if(iniMes === 0){ iniMes = 12; iniAno = ano - 1; }
    fimMes = mes; fimAno = ano;
  } else {
    iniMes = mes; iniAno = ano;
    fimMes = mes + 1; fimAno = ano;
    if(fimMes === 13){ fimMes = 1; fimAno = ano + 1; }
  }
  var pad = function(n){ return String(n).padStart(2,'0'); };
  var MESES = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return {
    dtIni: iniAno+'-'+pad(iniMes)+'-25',
    dtFim: fimAno+'-'+pad(fimMes)+'-24',
    label: '25/'+pad(iniMes)+'/'+iniAno+' a 24/'+pad(fimMes)+'/'+fimAno
  };
}

function _getPeriodoCfg(){
  // Lê cfg salva ou usa padrão atual
  var raw = _cfgCache['cfg_periodo']||null;
  if(raw && raw.dtIni && raw.dtFim) return raw;
  return _periodoComissao();
}

// Calcula o período 25-24 com deslocamento de N meses a partir do período base
var _comOffset = 0; // 0 = atual, -1 = anterior, +1 = próximo (compartilhado entre Comissões e Agregados)

// Gera opções de <select> com os últimos 12 períodos + 1 futuro
function _periodoOptionsHtml(){
  var opts=[];
  for(var off=1; off>=-11; off--){
    var p=_periodoComOffset(off);
    opts.push('<option value="'+off+'"'+(off===_comOffset?' selected':'')+'>'+p.label+(off===0?' (atual)':'')+'</option>');
  }
  return opts.join('');
}
function _periodoComOffset(offset){
  var base = _getPeriodoCfg();
  // base.dtIni está no formato AAAA-MM-25
  var p = base.dtIni.split('-');
  var ano = +p[0], mes = +p[1];
  // Aplicar offset de meses
  var total = (ano*12 + (mes-1)) + offset;
  var iniAno = Math.floor(total/12), iniMes = (total%12)+1;
  var totalFim = total + 1;
  var fimAno = Math.floor(totalFim/12), fimMes = (totalFim%12)+1;
  var pad = function(n){ return String(n).padStart(2,'0'); };
  return {
    dtIni: iniAno+'-'+pad(iniMes)+'-25',
    dtFim: fimAno+'-'+pad(fimMes)+'-24',
    label: '25/'+pad(iniMes)+'/'+iniAno+' a 24/'+pad(fimMes)+'/'+fimAno
  };
}

// RMAP usa o global já definido em index.html
var _impREVENDAS_ALL = [1,2,4,5,7,8,10,15,16,17];
var _impESPERADO = {1:1055,2:7778,4:894,5:685,7:304,8:785,10:1349,15:740,16:522,17:969};


// ── ABA BANCO ────────────────────────────────────────────────────────────────
var RMAP_FULL = {1:'Itu',2:'Sorocaba',4:'Franca',5:'Limeira',7:'Ipanema',
                 8:'Amparo',10:'Americana',15:'Sumaré',16:'Paulínia',17:'Indaiatuba'};

async function impCarregarBanco(){
  document.getElementById('imp-banco-estoque').innerHTML = '<div class="loading-txt">⏳ Consultando...</div>';
  document.getElementById('imp-banco-oficina').innerHTML  = '<div class="loading-txt">⏳ Consultando...</div>';

  // ── Estoque por revenda ────────────────────────────────────────────────────
  try{
    var revs = [1,2,4,5,7,8,10,15,16,17];
    var estoqueRows = [];
    for(var i=0;i<revs.length;i++){
      var rv = revs[i];
      var {count:cnt} = await _supa.from('estoque')
        .select('*',{count:'exact',head:true}).eq('revenda',rv);
      estoqueRows.push({rev:rv, nome:RMAP_FULL[rv], total:cnt||0});
    }
    var totalEst = estoqueRows.reduce(function(s,r){return s+r.total;},0);
    var html_est =
      '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
      '<thead><tr>'+
      '<th style="text-align:left;padding:6px;border-bottom:1px solid #333;color:#888">Unidade</th>'+
      '<th style="text-align:right;padding:6px;border-bottom:1px solid #333;color:#888">Itens</th>'+
      '<th style="text-align:center;padding:6px;border-bottom:1px solid #333;color:#888">Status</th>'+
      '</tr></thead><tbody>';
    var ESPERADO_EST = {1:1055,2:7778,4:894,5:685,7:304,8:785,10:1349,15:740,16:522,17:969};
    estoqueRows.forEach(function(r){
      var esp = ESPERADO_EST[r.rev]||0;
      var ok  = r.total >= esp*0.95;
      var cor = r.total===0?'#f44336':ok?'#4caf50':'#ff9800';
      var sts = r.total===0?'❌ Vazio':ok?'✅ OK':'⚠️ Incompleto';
      html_est += '<tr>'+
        '<td style="padding:6px;border-bottom:1px solid #222">'+r.nome+'</td>'+
        '<td style="padding:6px;border-bottom:1px solid #222;text-align:right;color:'+cor+';font-weight:700">'+
          r.total.toLocaleString('pt-BR')+'</td>'+
        '<td style="padding:6px;border-bottom:1px solid #222;text-align:center">'+sts+'</td>'+
        '</tr>';
    });
    html_est += '</tbody><tfoot><tr>'+
      '<td style="padding:6px;font-weight:700;color:#c8a227">TOTAL</td>'+
      '<td style="padding:6px;font-weight:700;color:#c8a227;text-align:right">'+totalEst.toLocaleString('pt-BR')+'</td>'+
      '<td></td></tr></tfoot></table>';
    document.getElementById('imp-banco-estoque').innerHTML = html_est;
  } catch(e){
    document.getElementById('imp-banco-estoque').innerHTML = '<div style="color:#f44;padding:8px">❌ Erro: '+e.message+'</div>';
  }

  // ── Oficina por unidade+mês ────────────────────────────────────────────────
  try{
    // Buscar grupos distintos com contagem — revenda por revenda para evitar limite 1000
    var grupos = {};
    var revs = [1,2,4,5,7,8,10,15,16,17];
    
    for(var ri=0; ri<revs.length; ri++){
      var rv = revs[ri];
      // Buscar anos e meses distintos para esta revenda
      var from=0, more=true;
      while(more){
        var {data:ofData, error:ofErr} = await _supa.from('oficina_os')
          .select('revenda, ano, mes')
          .eq('revenda', rv)
          .range(from, from+899);
        if(ofErr) throw ofErr;
        var chunk = ofData||[];
        chunk.forEach(function(r){
          var k = r.revenda+'|'+r.ano+'|'+r.mes;
          if(!grupos[k]) grupos[k]={rev:r.revenda,ano:r.ano,mes:r.mes,total:0};
          grupos[k].total++;
        });
        if(chunk.length < 900) more=false; else from+=900;
      }
    }

    if(!Object.keys(grupos).length){
      document.getElementById('imp-banco-oficina').innerHTML =
        '<div style="color:#888;padding:8px;text-align:center">Nenhum dado importado ainda.</div>';
      return;
    }

    var MESES = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    var html_of =
      '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
      '<thead><tr>'+
      '<th style="text-align:left;padding:6px;border-bottom:1px solid #333;color:#888">Unidade</th>'+
      '<th style="text-align:center;padding:6px;border-bottom:1px solid #333;color:#888">Período</th>'+
      '<th style="text-align:right;padding:6px;border-bottom:1px solid #333;color:#888">Lançamentos</th>'+
      '<th style="text-align:center;padding:6px;border-bottom:1px solid #333;color:#888">Ações</th>'+
      '</tr></thead><tbody>';

    var totalOf = 0;
    Object.keys(grupos).sort().forEach(function(k){
      var g = grupos[k];
      totalOf += g.total;
      html_of += '<tr>'+
        '<td style="padding:6px;border-bottom:1px solid #222">'+
          (RMAP_FULL[g.rev]||g.rev)+'</td>'+
        '<td style="padding:6px;border-bottom:1px solid #222;text-align:center">'+
          MESES[g.mes]+'/'+g.ano+'</td>'+
        '<td style="padding:6px;border-bottom:1px solid #222;text-align:right;color:#4caf50;font-weight:700">'+
          g.total.toLocaleString('pt-BR')+'</td>'+
        '<td style="padding:6px;border-bottom:1px solid #222;text-align:center">'+
          '<button onclick="impExcluirOficina('+g.rev+','+g.ano+','+g.mes+')" '+
          'style="padding:3px 10px;background:#2b0d0d;color:#f44;border:1px solid #f44;'+
          'border-radius:4px;cursor:pointer;font-size:11px">🗑️ Excluir</button></td>'+
        '</tr>';
    });

    html_of += '</tbody><tfoot><tr>'+
      '<td colspan="2" style="padding:6px;font-weight:700;color:#c8a227">TOTAL</td>'+
      '<td style="padding:6px;font-weight:700;color:#c8a227;text-align:right">'+
        totalOf.toLocaleString('pt-BR')+'</td>'+
      '<td></td></tr></tfoot></table>';

    document.getElementById('imp-banco-oficina').innerHTML = html_of;

  } catch(e){
    document.getElementById('imp-banco-oficina').innerHTML =
      '<div style="color:#f44;padding:8px">❌ Erro: '+e.message+'</div>';
  }
}

async function impExcluirOficina(rev, ano, mes){
  var MESES = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var nome = RMAP_FULL[rev]||rev;
  if(!confirm('Excluir TODOS os dados de '+nome+' — '+MESES[mes]+'/'+ano+'?\nEsta ação não pode ser desfeita.')) return;
  var {error:e} = await _supa.from('oficina_os').delete().eq('revenda',rev).eq('ano',ano).eq('mes',mes);
  if(e){ alert('Erro: '+e.message); return; }
  alert('✅ Dados de '+nome+' — '+MESES[mes]+'/'+ano+' excluídos!');
  impCarregarBanco();
}

// MÓDULO ESTOQUE
// ════════════════════════════════════════════════════════════
var _impmodo = null, _impfile = null, _impparsed = null;

function impSetModo(m){
  _impmodo = m;
  document.getElementById('imp-modo-rep').classList.toggle('sel', m==='replace');
  document.getElementById('imp-modo-upd').classList.toggle('sel', m==='update');
  document.getElementById('imp-confirm').style.display = m==='replace' ? 'block' : 'none';
  impAtualizarBotao();
}

function impConfirmarReplace(){
  document.getElementById('imp-confirm').style.display = 'none';
  impAtualizarBotao();
}

function impOnDrop(e){
  e.preventDefault();
  document.getElementById('imp-drop').classList.remove('over');
  var f = e.dataTransfer.files[0];
  if(f) impOnFile(f);
}

function impOnFile(file){
  _impfile = file;
  document.getElementById('imp-fname').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(e){
    var txt = e.target.result;
    txt = txt.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    _impparsed = impParseEstoque(txt);
    impRenderChips();
    impAtualizarBotao();
  };
  reader.readAsText(file, 'ISO-8859-1');
}

function impParseEstoque(txt){
  var lines = txt.split('\n');
  var cols = lines[0].split(';').map(function(c){return c.trim();});
  var byRev = {};
  for(var i=1;i<lines.length;i++){
    var p = lines[i].split(';');
    if(p.length < 5) continue;
    var rev = parseInt(p[cols.indexOf('REVENDA')]||'0');
    if(!rev) continue;
    if(!byRev[rev]) byRev[rev] = [];
    var row = {};
    cols.forEach(function(c,j){ row[c] = (p[j]||'').trim(); });
    byRev[rev].push(row);
  }
  return byRev;
}

function impRenderChips(){
  var grid = document.getElementById('imp-rev-grid');
  grid.innerHTML = _impREVENDAS_ALL.map(function(id){
    var n = _impparsed[id] ? _impparsed[id].length : 0;
    var esp = _impESPERADO[id] || 0;
    var cls = n === 0 ? '' : (n >= esp * 0.9 ? ' ok' : ' err');
    return '<div class="rev-chip'+cls+'">' + RMAP[id] + '<br>' + n + '</div>';
  }).join('');
}

function impAtualizarBotao(){
  var btn = document.getElementById('imp-btn-start');
  var confirm = document.getElementById('imp-confirm');
  if(!_impfile || !_impmodo){ btn.disabled=true; btn.textContent='Selecione o arquivo e o modo'; return; }
  if(_impmodo==='replace' && confirm.style.display!=='none'){ btn.disabled=true; btn.textContent='Confirme a substituição acima'; return; }
  var total = 0;
  if(_impparsed) Object.keys(_impparsed).forEach(function(k){ total += _impparsed[k].length; });
  btn.disabled = false;
  btn.textContent = '🚀 Iniciar importação — ' + total.toLocaleString('pt-BR') + ' itens';
}

function impLog(msg){ var l=document.getElementById('imp-impLog'); l.style.display='block'; l.innerHTML+='<div>'+msg+'</div>'; l.scrollTop=l.scrollHeight; }
function impProg(pct,lbl,det){
  var pa=document.getElementById('imp-impProg-area'); pa.style.display='block';
  document.getElementById('imp-impProg-bar').style.width=pct+'%';
  document.getElementById('imp-impProg-pct').textContent=pct+'%';
  document.getElementById('imp-impProg-label').textContent=lbl||'';
  if(det) document.getElementById('imp-impProg-detalhe').textContent=det;
}

  _impfile = null;
  _impparsed = null;
  _impmodo = null;
  document.getElementById('imp-fname').textContent = '';
  document.getElementById('imp-fi').value = '';
  document.getElementById('imp-rev-grid').innerHTML = '';
  document.getElementById('imp-impProg-area').style.display = 'none';

  document.getElementById('imp-impProg-pct').textContent = '0%';
  document.getElementById('imp-resultado').style.display = 'none';
  document.getElementById('imp-impLog').innerHTML = '';
  document.getElementById('imp-impLog').style.display = 'none';
  document.getElementById('imp-confirm').style.display = 'none';
  document.getElementById('imp-modo-rep').classList.remove('sel');
  document.getElementById('imp-modo-upd').classList.remove('sel');
  document.getElementById('imp-btn-start').disabled = true;
  document.getElementById('imp-btn-start').textContent = 'Selecione o arquivo e o modo';
}

async function impIniciar(){
  if(!_impparsed||!_impmodo) return;
  document.getElementById('imp-btn-start').disabled = true;
  document.getElementById('imp-impLog').innerHTML = '';
  document.getElementById('imp-resultado').style.display = 'none';
  var LOTE = 30;
  var revs = Object.keys(_impparsed).map(Number);
  var totalItens = 0; revs.forEach(function(r){ totalItens += _impparsed[r].length; });
  var inseridos = 0;
  var resultados = [];
  try{
    if(_impmodo==='replace'){
      impLog('🗑️ Apagando tabela de estoque...');
      impProg(2,'Apagando dados...','');
      var {error:de} = await _supa.from('estoque').delete().neq('id',0);
      if(de) throw de;
      impLog('✅ Tabela limpa.');
    }
    for(var ri=0; ri<revs.length; ri++){
      var rev = revs[ri];
      var rows = _impparsed[rev];
      impLog('📦 Importando ' + RMAP[rev] + ' (' + rows.length + ' itens)...');
      var ok = 0, fail = 0;
      for(var i=0; i<rows.length; i+=LOTE){
        var lote = rows.slice(i,i+LOTE).map(function(r){
          function n(v){ return parseFloat((v||'0').replace(',','.'))||0; }
          return {
            revenda: parseInt(r.REVENDA)||0,
            item: r.ITEM_ESTOQUE_PUB||'',
            descricao: r.DES_ITEM_ESTOQUE||'',
            abc: r.CLASS_ABC||'',
            qtd_contabil: n(r.QTD_CONTABIL),
            qtd_res_oficina: n(r.QTD_RES_OFICINA),
            qtd_negociacao: n(r.QTD_NEGOCIACAO||'0'),
            qtd_alocada: n(r.QTD_ALOCADA),
            qtd_orcada: n(r.QTD_ORCADA||'0'),
            qtd_conferencia: n(r.QTD_CONFERENCIA||'0'),
            qtd_comprometida: n(r.QTD_COMPROMETIDA||'0'),
            qtd_disponivel: n(r.QTD_DISPONIVEL),
            demanda_media: n(r.DEMANDA_MEDIA||'0'),
            locacao: r.LOCACAO||'',
            custo_medio: n(r.CUSTO_MEDIO||r.CUSTO_UNITARIO||'0'),
            val_estoque: n(r.VAL_ESTOQUE||r.CUSTO_TOTAL||'0'),
            nome_grupo: r.NOME_GRUPO||r.GRUPO||'',
            preco_publico: n(r.PRECO_PUBLICO||r.PRECO_PUB||'0'),
            dias: n(r.DIAS||'0')
          };
        });
        var tentativa = 0, maxTent = 5, sucesso = false;
        while(tentativa < maxTent && !sucesso){
          tentativa++;
          var op = _impmodo==='replace'
            ? await _supa.from('estoque').insert(lote)
            : await _supa.from('estoque').upsert(lote, {onConflict:'revenda,item'});
          if(!op.error){ ok += lote.length; sucesso = true; }
          else if(tentativa < maxTent){ await new Promise(function(r){setTimeout(r,1000*tentativa);}); }
          else{ fail += lote.length; impLog('⚠️ Falha lote ' + RMAP[rev] + ' i=' + i); }
        }
        inseridos += lote.length;
        var pct = Math.round(5 + (inseridos/totalItens)*90);
        impProg(pct, 'Importando ' + RMAP[rev] + '...', ok + '/' + rows.length + ' itens');
      }
      resultados.push({rev: RMAP[rev], ok: ok, fail: fail});
      impLog((fail===0?'✅':'⚠️') + ' ' + RMAP[rev] + ': ' + ok + ' ok' + (fail?' / '+fail+' falhas':''));
    }
    impProg(100,'✅ Concluído!','');

var _impofFile = null, _impofRows = [];
var _impOF_NAMES = {'itu':1,'sorocaba':2,'franca':4,'limeira':5,'ipanema':7,
  'amparo':8,'americana':10,'sumare':15,'paulinia':16,'indaiatuba':17};

function impOnDropOf(e){
  e.preventDefault();
  document.getElementById('imp-of-drop').classList.remove('over');
  var f = e.dataTransfer.files[0];
  if(f) impOnFileOf(f);
}

function impOnFileOf(file){
  _impofFile = file;
  document.getElementById('imp-of-fname').textContent = file.name;
  // Detectar revenda pelo nome
  var nome = file.name.toLowerCase().replace(/[_\-\s\.]/g,' ');
  Object.keys(_impOF_NAMES).forEach(function(k){
    if(nome.indexOf(k) >= 0) document.getElementById('imp-of-rev').value = _impOF_NAMES[k];
  });
  impAtualizarBotaoOf(); // atualizar após detectar revenda
  var reader = new FileReader();
  reader.onload = function(e){
    var txt = e.target.result;
    // Limpar BOM e normalizar quebras de linha
    txt = txt.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    var lines = txt.split('\n').filter(function(l){return l.trim().length > 0;});
    if(lines.length < 2){
      alert('Arquivo inválido ou vazio. Verifique o arquivo e tente novamente.');
      return;
    }
    var cols = lines[0].split(';').map(function(c){return c.trim();});
    _impofRows = [];
    for(var i=1;i<lines.length;i++){
      var p = lines[i].split(';');
      if(p.length < 5) continue;
      var row = {};
      cols.forEach(function(c,j){ row[c] = (p[j]||'').trim(); });
      _impofRows.push(row);
    }
    // Preview
    var osU = {}, valT = 0, tipoP = 0, tipoS = 0;
    _impofRows.forEach(function(r){
      osU[r.NRO_OS] = 1;
      try{ valT += parseFloat((r.VLR_ITEM||'0').replace(',','.')); }catch(e){}
      if(r.TIPO_ITEM==='P') tipoP++; else if(r.TIPO_ITEM==='S') tipoS++;
    });
    var datas = _impofRows.map(function(r){return r.DATA;}).filter(Boolean).sort();

    // Detectar mês/ano automaticamente pelo conteúdo do arquivo
    var mesDetectado = '', anoDetectado = '';
    if(datas.length){
      // Formato DD/MM/YYYY — pegar o mês/ano mais frequente
      var freqMes = {};
      datas.forEach(function(d){
        var p = d.split('/');
        if(p.length>=3){
          var k = p[2]+'-'+(p[1].length===1?'0'+p[1]:p[1]); // YYYY-MM
          freqMes[k] = (freqMes[k]||0)+1;
        }
      });
      // Pegar o mês com mais ocorrências
      var melhorK = Object.keys(freqMes).sort(function(a,b){return freqMes[b]-freqMes[a];})[0];
      if(melhorK){
        mesDetectado = melhorK; // YYYY-MM
        var partesMes = melhorK.split('-');
        anoDetectado = partesMes[0];
        // Preencher automaticamente o campo de mês
        var campoMes = document.getElementById('imp-of-mes');
        if(campoMes && !campoMes.value){
          campoMes.value = melhorK;
        }
      }
    }

    var prev = document.getElementById('imp-of-preview');
    prev.style.display = 'block';

    // Verificar divergência entre mês detectado e mês selecionado
    var mesSel = document.getElementById('imp-of-mes').value;
    var avisoMes = '';
    if(mesDetectado && mesSel && mesSel !== mesDetectado){
      avisoMes = '<div style="margin-top:8px;padding:8px;background:#2b1500;border:1px solid #ff6d00;'+
        'border-radius:6px;font-size:12px;color:#ff9800">'+
        '⚠️ <strong>Atenção:</strong> O arquivo parece ser de <strong>'+mesDetectado+'</strong> '+
        'mas o campo mês está com <strong>'+mesSel+'</strong>. '+
        '<button onclick="document.getElementById(\'of-mes\').value=\''+mesDetectado+'\';impAtualizarBotaoOf();" '+
        'style="margin-left:8px;padding:2px 8px;background:#ff6d00;border:none;border-radius:4px;'+
        'color:#fff;cursor:pointer;font-size:11px">Corrigir para '+mesDetectado+'</button></div>';
    } else if(mesDetectado){
      avisoMes = '<div style="margin-top:6px;font-size:12px;color:#4caf50">'+
        '✅ Mês detectado automaticamente: <strong>'+mesDetectado+'</strong></div>';
    }

    prev.innerHTML = '<strong>📊 Preview:</strong> ' +
      _impofRows.length.toLocaleString('pt-BR') + ' lançamentos &nbsp;|&nbsp; ' +
      Object.keys(osU).length.toLocaleString('pt-BR') + ' OS únicas &nbsp;|&nbsp; ' +
      'Peças: ' + tipoP + ' / Serviços: ' + tipoS + '<br>' +
      'Período: <strong>' + (datas[0]||'—') + ' a ' + (datas[datas.length-1]||'—') + '</strong>' +
      ' &nbsp;|&nbsp; Valor: <strong>R$ ' + valT.toLocaleString('pt-BR',{minimumFractionDigits:2}) + '</strong>' +
      avisoMes;
    impAtualizarBotaoOf();
  };
  reader.readAsText(file, 'ISO-8859-1');
}

async function impIniciarOf(){
  var rev = parseInt(document.getElementById('imp-of-rev').value);
  var mes = document.getElementById('imp-of-mes').value;
  if(!rev){ alert('Selecione a unidade.'); return; }
  if(!mes){ alert('Selecione o mês/ano.'); return; }
  if(!_impofRows.length){ alert('Carregue o arquivo de OS primeiro.'); return; }

  var revNome = RMAP[rev]||rev;
  var mesLabel = new Date(mes+'-02').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  if(!confirm('Importar '+_impofRows.length.toLocaleString('pt-BR')+' lançamentos de '+revNome+' — '+mesLabel+'?\n\nDados existentes desta unidade+mês serão substituídos.')) return;

  document.getElementById('imp-of-btn').disabled = true;
  document.getElementById('imp-of-impLog').innerHTML = '';
  document.getElementById('imp-of-resultado').style.display = 'none';

  var partes = mes.split('-');
  var ano = parseInt(partes[0]), mesN = parseInt(partes[1]);
  var LOTE = 30; // igual à ferramenta de estoque — lotes pequenos sem timeout
  var MAX_TENT = 999; // retry infinito

  // Preparar linhas
  var inserir = _impofRows.map(function(r){
    function pf(v){ try{return parseFloat((v||'0').replace(',','.'))||0;}catch(e){return 0;} }
    function pi(v){ try{return parseInt(v||'0')||0;}catch(e){return 0;} }
    function pd(v){
      if(!v||!v.trim()) return null;
      var p=v.trim().split(' '); var dp=p[0].split('/');
      if(dp.length===3) return dp[2]+'-'+dp[1]+'-'+dp[0]+(p[1]?' '+p[1]:'');
      return null;
    }
    return{
      revenda:rev, ano:ano, mes:mesN,
      nro_os:r.NRO_OS||'', tipo_item:r.TIPO_ITEM||'', tipo_os:r.TIPO_OS||'',
      nro_lancamento:pi(r.NRO_LANCAMENTO), tipo_servico:r.TIPO_SERVICO||'',
      contato:r.CONTATO||'', dta_fim_franquia:pd(r.DTA_FIM_FRANQUIA),
      nro_nota:r.NRO_NOTA||'', serie_nota:r.SERIE_NOTA||'',
      dta_emissao:pd(r.DTA_EMISSAO), data_os:pd(r.DATA),
      val_unitario:pf(r.VAL_UNITARIO), vlr_item:pf(r.VLR_ITEM),
      quantidade:pf(r.QUANTIDADE), val_desconto:pf(r.VAL_DESCONTO),
      val_desconto_franquia:pf(r.VAL_DESCONTO_FRANQUIA),
      nome_cliente:r.NOME_CLIENTE||'', mecanico:r.MECANICO||'',
      nome_mecanico:r.NOME_MECANICO||'', equipe:r.EQUIPE||'',
      nome_equipe:r.NOME_EQUIPE||'', secao_oficina:r.SECAO_OFICINA||'',
      nome_secao:r.NOME_SECAO||'', categoria_os:r.CATEGORIA_OS||'',
      nome_categoria:r.NOME_CATEGORIA||'', descricao:r.DESCRICAO||'',
      item:r.ITEM||'', observacao:r.OBSERVACAO||'', des_diagnostico:r.DES_DIAGNOSTICO||''
    };
  });

  var total = inserir.length;

  try{
    // ── PASSO 1: Apagar com retry ─────────────────────────────────────────
    impOfProg(2,'Apagando dados anteriores...','');
    impOfLog('🗑️ Removendo '+revNome+' — '+mesLabel+'...');
    var delOk = false, delTent = 0;
    while(!delOk){
      delTent++;
      var {error:de} = await _supa.from('oficina_os').delete().eq('revenda',rev).eq('ano',ano).eq('mes',mesN);
      if(!de){ delOk=true; impOfLog('✅ Removido (tentativa '+delTent+')'); }
      else{
        impOfLog('⚠️ Delete tentativa '+delTent+': '+de.message+' — aguardando '+Math.min(delTent,10)+'s...');
        await new Promise(function(r){setTimeout(r, Math.min(delTent,10)*1000);});
      }
    }

    // ── PASSO 2: Inserir em lotes de 30 com retry infinito ────────────────
    impOfLog('📤 Inserindo '+total.toLocaleString('pt-BR')+' lançamentos em lotes de '+LOTE+'...');
    var ins = 0;
    for(var i=0; i<total; i+=LOTE){
      var lote = inserir.slice(i, i+LOTE);
      var loteTent = 0, loteOk = false;
      while(!loteOk){
        loteTent++;
        var {error:ie} = await _supa.from('oficina_os').insert(lote);
        if(!ie){
          loteOk = true;
          ins += lote.length;
        } else {
          var espera = Math.min(loteTent * 500, 5000);
          impOfLog('⚠️ Lote '+(Math.floor(i/LOTE)+1)+' tent.'+loteTent+': '+ie.message+' — retry em '+(espera/1000).toFixed(1)+'s');
          await new Promise(function(r){setTimeout(r, espera);});
        }
      }
      var pct = Math.round(5 + (ins/total)*85);
      impOfProg(pct, 'Inserindo...', ins.toLocaleString('pt-BR')+' / '+total.toLocaleString('pt-BR')+' lançamentos');
    }

    // ── PASSO 3: Verificação obrigatória ──────────────────────────────────
    impOfProg(92,'Verificando no banco...','');
    impOfLog('🔍 Verificando contagem no banco...');
    var {data:vd, error:ve} = await _supa.from('oficina_os')
      .select('id', {count:'exact', head:true})
      .eq('revenda',rev).eq('ano',ano).eq('mes',mesN);

    var countBanco = 0;
    if(!ve){
      var {count:cnt} = await _supa.from('oficina_os')
        .select('*', {count:'exact', head:true})
        .eq('revenda',rev).eq('ano',ano).eq('mes',mesN);
      countBanco = cnt || 0;
    }

    impOfProg(100,'✅ Concluído!','');

    var ok = countBanco >= Math.floor(total * 0.98);
    var icone = ok ? '✅' : '⚠️';
    impOfLog(icone+' Banco: '+countBanco.toLocaleString('pt-BR')+' / Arquivo: '+total.toLocaleString('pt-BR')+
      (ok ? ' — OK!' : ' — DIVERGÊNCIA! Reimporte se necessário.'));

    // Resultado final
    var res = document.getElementById('imp-of-resultado');
    res.style.display = 'block';
    res.style.borderColor = ok ? '#4caf50' : '#f44336';
    document.getElementById('imp-of-res-titulo').innerHTML =
      (ok ? '✅' : '⚠️')+' Importação '+(ok?'concluída!':'com divergência!');
    document.getElementById('imp-of-res-sub').innerHTML =
      '<table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:13px">'+
      '<tr><th style="text-align:left;padding:4px;background:#222;color:#c8a227">Item</th>'+
      '<th style="text-align:right;padding:4px;background:#222;color:#c8a227">Qtde</th></tr>'+
      '<tr><td style="padding:4px;border-bottom:1px solid #333">Lançamentos no arquivo</td>'+
      '<td style="padding:4px;border-bottom:1px solid #333;text-align:right">'+total.toLocaleString('pt-BR')+'</td></tr>'+
      '<tr><td style="padding:4px;border-bottom:1px solid #333">Lançamentos no banco</td>'+
      '<td style="padding:4px;border-bottom:1px solid #333;text-align:right;color:'+(ok?'#4caf50':'#f44336')+'">'+countBanco.toLocaleString('pt-BR')+'</td></tr>'+
      '<tr><td style="padding:4px">Unidade / Período</td>'+
      '<td style="padding:4px;text-align:right">'+revNome+' — '+mesLabel+'</td></tr>'+
      '</table>'+
      '<button onclick="impResetOficina()" style="margin-top:14px;width:100%;padding:12px;background:#1a1a1a;border:2px solid #c8a227;border-radius:8px;color:#c8a227;font-size:14px;font-weight:700;cursor:pointer">📂 Importar outro arquivo</button>';

  } catch(err){
    impOfLog('❌ ERRO FATAL: '+(err.message||JSON.stringify(err)));
    impOfProg(0,'❌ Erro','');
    document.getElementById('imp-of-btn').disabled = false;
  }
}

async function loadFrotasCard(){
  var el=document.getElementById('frotas-content'); if(!el) return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var p=OFI.mes.split('-'), ano=+p[0], mes=+p[1];
  var dtIni=ano+'-'+String(mes).padStart(2,'0')+'-01';
  var ultimoDia=new Date(ano,mes,0).getDate();
  var dtFim=ano+'-'+String(mes).padStart(2,'0')+'-'+String(ultimoDia).padStart(2,'0');

  var rows=[], from=0, more=true;
  while(more){
    var {data:d,error:e}=await _supa.from('oficina_os')
      .select('*').eq('revenda',OFI.rev)
      .gte('data_os',dtIni).lte('data_os',dtFim)
      .range(from,from+899);
    if(e){el.innerHTML='<div class="aerr">Erro: '+e.message+'</div>';return;}
    rows=rows.concat(d||[]);
    if((d||[]).length<900) more=false; else from+=900;
  }

  // Filtrar equipe frotas (nome_equipe contém FROT ou nome_secao FROTAS ou equipe 77)
  var frotasRows=rows.filter(function(r){
    var eq=(r.nome_equipe||'').toUpperCase();
    var sec=(r.nome_secao||'').toUpperCase();
    return eq.indexOf('FROT')>=0||sec.indexOf('FROT')>=0;
  });

  if(!frotasRows.length){
    el.innerHTML='<div style="text-align:center;padding:3rem;color:#aaa">'+
      getIcon('frotas',48,'#ddd')+
      '<p style="margin-top:1rem">Nenhum dado de Frotas para '+rn(OFI.rev)+' — '+OFI.mes+'</p></div>';
    return;
  }

  var sRows=frotasRows.filter(function(r){return r.tipo_item==='S';});
  var pRows=frotasRows.filter(function(r){return r.tipo_item==='P';});
  var osU={}; frotasRows.forEach(function(r){osU[r.nro_os]=1;});
  var fatSvc=sRows.reduce(function(s,r){return s+(+r.vlr_item||0);},0);
  var fatPec=pRows.reduce(function(s,r){return s+(+r.vlr_item||0);},0);
  var fatTot=fatSvc+fatPec;
  var totalOS=Object.keys(osU).length;
  var ticket=totalOS>0?fatTot/totalOS:0;

  // Por mecânico/frotista
  var porMec={};
  frotasRows.forEach(function(r){
    var cod=r.mecanico||'?';
    if(!porMec[cod]) porMec[cod]={cod:cod,nome:r.nome_mecanico||cod,fatS:0,fatP:0,os:{}};
    if(r.tipo_item==='S') porMec[cod].fatS+=(+r.vlr_item||0);
    if(r.tipo_item==='P') porMec[cod].fatP+=(+r.vlr_item||0);
    porMec[cod].os[r.nro_os]=1;
  });

  // Por dia
  var porDia={};
  frotasRows.forEach(function(r){
    if(!r.data_os) return;
    var dd=r.data_os.substring(0,10);
    if(!porDia[dd]) porDia[dd]={svc:0,pec:0};
    if(r.tipo_item==='S') porDia[dd].svc+=(+r.vlr_item||0);
    else porDia[dd].pec+=(+r.vlr_item||0);
  });
  var diasKeys=Object.keys(porDia).sort();
  var maxDia=Math.max.apply(null,diasKeys.map(function(d){return porDia[d].svc+porDia[d].pec;})||[1]);

  var barrasHtml=diasKeys.map(function(d){
    var vSvc=porDia[d].svc,vPec=porDia[d].pec,vTot=vSvc+vPec;
    var hSvc=Math.max(2,Math.round((vSvc/maxDia)*56));
    var hPec=Math.max(2,Math.round((vPec/maxDia)*56));
    return'<div style="display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;min-width:18px;border-radius:4px;padding:2px" title="'+d+': '+fmt(vTot)+'">'+
      '<div style="font-size:8px;color:#aaa;margin-bottom:2px">'+fmt(vTot).replace('R$','').trim()+'</div>'+
      '<div style="display:flex;flex-direction:column;justify-content:flex-end;height:56px;width:100%;gap:1px">'+
      '<div style="height:'+hPec+'px;background:#c8a22780;border-radius:2px 2px 0 0;min-height:2px"></div>'+
      '<div style="height:'+hSvc+'px;background:#c8a227;border-radius:2px 2px 0 0;min-height:2px"></div>'+
      '</div><div style="font-size:8px;color:#888">'+d.substring(8,10)+'</div></div>';
  }).join('');

  _frotasPorMec=porMec; // cache para drilldown
  var mecHtml=Object.values(porMec).sort(function(a,b){return (b.fatS+b.fatP)-(a.fatS+a.fatP);}).map(function(m){
    var ft=m.fatS+m.fatP;
    return'<tr style="cursor:pointer" onclick="abrirDrillFrotaTec(\''+encodeURIComponent(m.cod)+'\')" title="Ver OS">'+
      '<td><strong>'+H(m.nome)+'</strong><br><span style="font-size:10px;color:#888">'+m.cod+'</span></td>'+
      '<td class="num">'+Object.keys(m.os).length+'</td>'+
      '<td class="num" style="color:#2e7d32">'+fmt(m.fatS)+'</td>'+
      '<td class="num" style="color:#1565c0">'+fmt(m.fatP)+'</td>'+
      '<td class="num" style="font-weight:700">'+fmt(ft)+'</td></tr>';
  }).join('');

  el.innerHTML=
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem">'+
    ['Faturamento Total|'+fmt(fatTot)+'|#1a237e','OS|'+fmtN(totalOS)+'|#2e7d32','Ticket Médio|'+fmt(ticket)+'|#e65100','Serviços|'+fmt(fatSvc)+'|#6a1b9a','Peças|'+fmt(fatPec)+'|#00695c'].map(function(k){
      var p2=k.split('|');
      return'<div style="flex:1;min-width:130px;background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem;border-left:4px solid '+p2[2]+'">'+
        '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase">'+p2[0]+'</div>'+
        '<div style="font-size:18px;font-weight:700;color:'+p2[2]+'">'+p2[1]+'</div></div>';
    }).join('')+'</div>'+
    '<div style="background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.5rem;margin-bottom:1rem">'+
    '<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#333">Faturamento dia a dia</div>'+
    '<div style="display:flex;align-items:flex-end;gap:2px;padding:4px 0;overflow-x:auto">'+barrasHtml+'</div></div>'+
    '<div style="background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.5rem">'+
    '<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#333">Por Frotista</div>'+
    '<div class="tw"><table><thead><tr><th>Nome</th><th>OS</th><th>Serviços</th><th>Peças</th><th>Total</th></tr></thead>'+
    '<tbody>'+mecHtml+'</tbody></table></div>'+
    '<div style="font-size:11px;color:#aaa;margin-top:8px">Clique em um frotista para ver as OS</div></div>';
}

var _frotasPorMec={};

async function abrirDrillFrotaTec(codEnc){
  var cod=decodeURIComponent(codEnc);
  var m=_frotasPorMec[cod];
  if(!m){alert('Frotista não encontrado.');return;}
  modal('Frotas — '+m.nome,'<div class="loading"><div class="spin"></div><div>Carregando...</div></div>');
  var mbox=document.querySelector('#modal .mbox'); if(mbox) mbox.style.width='92vw';
  await _ensureEstIdx();

  _drillSourceRows=_frotasRows;
  var baseRows=_frotasRows.filter(function(r){return r.mecanico===cod;});

  var cfgOf=_cfgOfiData||{};
  var agg10=(cfgOf.agg10||CFG_OFICINA_DEFAULTS.agg10||[]);
  var agg4 =(cfgOf.agg4 ||CFG_OFICINA_DEFAULTS.agg4 ||[]);
  var m10={},m4={};
  agg10.forEach(function(a){m10[a.cod]=1;(a.alts||[]).forEach(function(x){m10[x]=1;});});
  agg4.forEach(function(a) {m4[a.cod]=1; (a.alts||[]).forEach(function(x){m4[x]=1; });});

  var osMap={};
  baseRows.forEach(function(r){
    var os=r.nro_os;
    if(!osMap[os]) osMap[os]={nro_os:os,cliente:r.nome_cliente||'\u2014',data:r.data_os||'',fatS:0,fatP:0,fatA10:0,fatA4:0};
    if(r.tipo_item==='S') osMap[os].fatS+=(+r.vlr_item||0);
    if(r.tipo_item==='P'){osMap[os].fatP+=(+r.vlr_item||0);var it=(r.item||'').toUpperCase();if(m10[it])osMap[os].fatA10+=(+r.vlr_item||0);if(m4[it])osMap[os].fatA4+=(+r.vlr_item||0);}
  });
  var listaOS=Object.values(osMap).sort(function(a,b){return (a.data||'').localeCompare(b.data||'');});
  var kpis=_drillKpiBar(baseRows,true);
  if(!listaOS.length){S('mbody',kpis+'<div class="ainfo">Nenhuma OS encontrada.</div>');return;}

  var tabelaOS='<div style="overflow:auto;max-height:52vh;border:1px solid #e8e8e8;border-radius:8px">'+
    '<table style="width:100%;border-collapse:collapse;font-size:12px;min-width:680px">'+
    '<thead><tr style="background:#f5f5f5;position:sticky;top:0">'+
    '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8a227">OS</th>'+
    '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8a227">Data</th>'+
    '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8a227">Cliente</th>'+
    '<th style="padding:8px 10px;text-align:right;border-bottom:2px solid #c8a227">Fat. Total</th>'+
    '<th style="padding:8px 10px;text-align:right;border-bottom:2px solid #c8a227">Servi\u00e7os</th>'+
    '<th style="padding:8px 10px;text-align:right;border-bottom:2px solid #c8a227">Pe\u00e7as</th>'+
    '<th style="padding:8px 10px;text-align:right;border-bottom:2px solid #c8a227">Agg 10%</th>'+
    '<th style="padding:8px 10px;text-align:right;border-bottom:2px solid #c8a227">Agg 4%</th>'+
    '</tr></thead><tbody>'+
    listaOS.map(function(o,i){
      var fatT=o.fatS+o.fatP,dtL=o.data?o.data.substring(0,10).split('-').reverse().join('/'):'--';
      var nrSafe=String(o.nro_os).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return'<tr style="background:'+(i%2===0?'#fff':'#fafafa')+';cursor:pointer" onclick="abrirDrillOSDetalhe(\''+nrSafe+'\')" title="Ver detalhes">'+
        '<td style="padding:7px 10px;font-weight:700;color:#1a237e">'+H(o.nro_os)+'</td>'+
        '<td style="padding:7px 10px;white-space:nowrap">'+dtL+'</td>'+
        '<td style="padding:7px 10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+H(o.cliente)+'">'+H(o.cliente)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;font-weight:700">'+fmt(fatT)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;color:#2e7d32">'+fmt(o.fatS)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;color:#1565c0">'+fmt(o.fatP)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;color:#6a1b9a">'+fmt(o.fatA10)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;color:#00695c">'+fmt(o.fatA4)+'</td>'+
        '</tr>';
    }).join('')+'</tbody></table></div>'+
    '<div style="font-size:11px;color:#aaa;margin-top:8px">'+listaOS.length+' OS \u2014 clique para detalhar</div>';
  S('mbody',kpis+tabelaOS);
}

var _comRows=[];
var _comResultados=[];
var _comAgg10Map={},_comAgg4Map={},_comI100Map={};

    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">'+

    '</div></div></div>'+
    '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">'+
    '<select onchange="OFI.rev=+this.value;loadComissoesTab()" class="ofi-sel" style="padding:8px 14px;border-radius:8px;background:#fff;border:2px solid #c8a227;color:#1a1a2e;font-size:13px;font-weight:600">'+revOpts+'</select>'+
    '</div></div>'+
    '<div style="display:flex;gap:8px;margin-top:14px">'+

async function loadComissoesTab(){
  if(_comTab==='nps') await loadDescNps();
  else if(_comTab==='treinamento') await loadDescTreinamento();
  else await loadComissoes();
}

async function loadComissoes(){
  var el=document.getElementById('com-content'); if(!el) return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';

  // Período (selecionado via dropdown)
  await _cfgGet('cfg_periodo');
  var per=_periodoComOffset(_comOffset);
  var sel=document.getElementById('com-per-sel');
  if(sel) sel.value=String(_comOffset);

  // Dados OS no período
  var rows=[], from=0, more=true;
  while(more){
    var {data:d,error:e}=await _supa.from('oficina_os')
      .select('*').eq('revenda',OFI.rev)
      .gte('data_os',per.dtIni).lte('data_os',per.dtFim)
      .range(from,from+899);
    if(e){el.innerHTML='<div class="aerr">Erro: '+e.message+'</div>';return;}
    rows=rows.concat(d||[]);
    if((d||[]).length<900) more=false; else from+=900;
  }
  _comRows=rows;

  if(!rows.length){
    el.innerHTML='<div style="text-align:center;padding:3rem;color:#aaa">'+
      getIcon('comissoes',48,'#ddd')+
      '<p style="margin-top:1rem">Nenhum dado para '+rn(OFI.rev)+' no período '+per.label+'</p></div>';
    return;
  }

  // Carregar técnicos cadastrados
  var tecs=await _tecsLoad();

  // Descontos NPS e Treinamento
  var cfgDesc=(await _cfgGet('cfg_descontos'))||{pct_nps:0.01,pct_treinamento:0.005};
  var npsTecs=(await _cfgGet('cfg_nps_tecs'))||{};
  var treinTecs=(await _cfgGet('cfg_treinamento_tecs'))||{};

  // Config oficina
  var cfgOf=_cfgOfiData||{};
  var agg10=(cfgOf.agg10||CFG_OFICINA_DEFAULTS.agg10||[]);
  var agg4 =(cfgOf.agg4 ||CFG_OFICINA_DEFAULTS.agg4 ||[]);
  var i100 =(cfgOf.itens100||CFG_OFICINA_DEFAULTS.itens100||[]);
  var m10={},m4={},mi100=new Set();
  agg10.forEach(function(a){m10[a.cod]=1;(a.alts||[]).forEach(function(x){m10[x]=1;});});
  agg4.forEach(function(a) {m4[a.cod]=1; (a.alts||[]).forEach(function(x){m4[x]=1; });});
  i100.forEach(function(a){mi100.add(a.cod);});

  var escTec=(cfgOf.escala_tec||CFG_OFICINA_DEFAULTS.escala_tec||[]);
  var escAli=(cfgOf.escala_ali||CFG_OFICINA_DEFAULTS.escala_ali||[]);
  var escFun=(cfgOf.escala_fun||CFG_OFICINA_DEFAULTS.escala_fun||[]);
  var escAgg10=(cfgOf.escala_agg10||CFG_OFICINA_DEFAULTS.escala_agg10||[]);

  // Calcular por técnico
  function calcComissaoTec(fatTot, politica){
    var faixa=escTec.filter(function(e){return e.politica===politica;}).find(function(e){
      return fatTot>=e.fat_min&&(e.fat_max==null||fatTot<=e.fat_max);
    });
    return faixa?faixa.pct:0;
  }
  function calcComissaoAli(fatAli, politica){
    var faixas=escAli.filter(function(e){return e.politica===politica&&fatAli>=e.fat_min;});
    if(!faixas.length) return 0;
    return faixas.reduce(function(best,e){return e.fat_min>best.fat_min?e:best;},faixas[0]).valor;
  }
  function calcComissaoAgg10(fatAgg10Val){
    var faixa=escAgg10.find(function(e){return fatAgg10Val>=e.min&&fatAgg10Val<=e.max;});
    return faixa?faixa.pct:0;
  }
  var escAgg4=(cfgOf.escala_agg4||CFG_OFICINA_DEFAULTS.escala_agg4||[]);
  function calcComissaoAgg4(fatAgg4Val){
    var faixa=escAgg4.find(function(e){return fatAgg4Val>=e.min&&fatAgg4Val<=e.max;});
    return faixa?faixa.pct:0.04;
  }

  // Agrupar por mecânico principal
  var mecMap={};
  Object.values(tecs).filter(function(t){return t.cod_mec&&t.ativo!==false;}).forEach(function(t){
    mecMap[t.cod_mec]={t:t, fatS:0, fatP:0, fatAgg10:0, fatAgg4:0, qtd100:0};
  });

  // Cruzar cod_alin também (alinhador separado)
  var aliMap={};
  Object.values(tecs).filter(function(t){return t.cod_alin&&t.ativo!==false;}).forEach(function(t){
    aliMap[t.cod_alin]={t:t, fatAli:0};
  });

  rows.forEach(function(r){
    var cod=r.mecanico;
    var it=(r.item||'').toUpperCase();
    var v=+r.vlr_item||0;
    if(mecMap[cod]){
      if(r.tipo_item==='S') mecMap[cod].fatS+=v;
      if(r.tipo_item==='P'){
        mecMap[cod].fatP+=v;
        if(m10[it]) mecMap[cod].fatAgg10+=v;
        if(m4[it])  mecMap[cod].fatAgg4+=v;
        if(mi100.has(it)) mecMap[cod].qtd100++;
      }
    }
    if(aliMap[cod]){
      aliMap[cod].fatAli+=v;
    }
  });

  // Gerar resultados mecânicos
  var resultados=Object.values(mecMap).map(function(m){
    var t=m.t;
    var fat=m.fatS+m.fatP;
    var uniPols=_cfgUniPolsData||{};
    var revArr=Object.keys(t.revendas||{}).map(Number);
    var pol='TEC01';
    for(var i=0;i<revArr.length;i++){var up=uniPols[revArr[i]];if(up&&up.tec){pol=up.tec;break;}}
    var pctEscala=calcComissaoTec(fat,pol);
    var pontoNps=(npsTecs[t.cod_mec]&&npsTecs[t.cod_mec].desconto)?(cfgDesc.pct_nps||0):0;
    var pontoTrein=(treinTecs[t.cod_mec]&&treinTecs[t.cod_mec].desconto)?(cfgDesc.pct_treinamento||0):0;
    var pct=Math.max(0,pctEscala-pontoNps-pontoTrein);
    var comSvc=m.fatS*pct, comPec=m.fatP*pct;
    var pctAgg10=calcComissaoAgg10(m.fatAgg10);
    var comAgg10=m.fatAgg10*pctAgg10;
    var pctAgg4=calcComissaoAgg4(m.fatAgg4);
    var comAgg4=m.fatAgg4*pctAgg4;
    // 100 itens: escala fixa (60->60, 80->90, 100->120)
    var com100=0;
    if(m.qtd100>=100) com100=120; else if(m.qtd100>=80) com100=90;
    else if(m.qtd100>=60) com100=60;
    var comTotal=comSvc+comPec+comAgg10+comAgg4+com100;
    return{nome:t.nome,cod_mec:t.cod_mec,pol:pol,fat:fat,fatS:m.fatS,fatP:m.fatP,
      pctEscala:pctEscala,pontoNps:pontoNps,pontoTrein:pontoTrein,pct:pct,comSvc:comSvc,comPec:comPec,
      fatAgg10:m.fatAgg10,pctAgg10:pctAgg10,comAgg10:comAgg10,
      fatAgg4:m.fatAgg4,pctAgg4:pctAgg4,comAgg4:comAgg4,qtd100:m.qtd100,com100:com100,comTotal:comTotal,
      comAggTotal:comAgg10+comAgg4+com100};
  }).filter(function(r){return r.fat>0;}).sort(function(a,b){return b.comTotal-a.comTotal;});

  // Alinhadores
  var aliResultados=Object.values(aliMap).map(function(m){
    var t=m.t;
    var uniPols=_cfgUniPolsData||{};
    var revArr=Object.keys(t.revendas||{}).map(Number);
    var pol='ALI01';
    for(var i=0;i<revArr.length;i++){var up=uniPols[revArr[i]];if(up&&up.ali){pol=up.ali;break;}}
    var com=calcComissaoAli(m.fatAli,pol);
    return{nome:t.nome,pol:pol,fatAli:m.fatAli,com:com};
  }).filter(function(r){return r.fatAli>0;}).sort(function(a,b){return b.com-a.com;});

  // Totais
  var totCom=resultados.reduce(function(s,r){return s+r.comTotal;},0);
  var totAli=aliResultados.reduce(function(s,r){return s+r.com;},0);

  _comResultados=resultados; // cache para drilldown
  var mecTabela=resultados.map(function(r,i){
    return'<tr style="cursor:pointer" onclick="abrirDrillComissao(\''+encodeURIComponent(r.cod_mec)+'\')" title="Ver detalhes">'+
      '<td><strong>'+H(r.nome)+'</strong></td>'+
      '<td><span style="font-size:10px;background:#e3f2fd;color:#1565c0;padding:1px 5px;border-radius:3px">'+r.pol+'</span></td>'+
      '<td class="num">'+fmt(r.fat)+'</td>'+
      '<td class="num" style="color:#888">'+(r.pctEscala*100).toFixed(2)+'%</td>'+
      '<td class="num">'+fmt(r.comPec)+'</td>'+
      '<td class="num">'+fmt(r.comSvc)+'</td>'+
      '<td class="num" style="color:#6a1b9a">'+fmt(r.comAggTotal)+'</td>'+
      '<td class="num" style="font-weight:700;font-size:14px;color:#1a237e">'+fmt(r.comTotal)+'</td>'+
      '</tr>';
  }).join('');

  var aliTabela=aliResultados.map(function(r){
    return'<tr>'+
      '<td><strong>'+H(r.nome)+'</strong><br><span style="font-size:10px;background:#e8f5e9;color:#2e7d32;padding:1px 5px;border-radius:3px">'+r.pol+'</span></td>'+
      '<td class="num">'+fmt(r.fatAli)+'</td>'+
      '<td class="num" style="font-weight:700;color:#2e7d32">'+fmt(r.com)+'</td>'+
      '</tr>';
  }).join('');

  el.innerHTML=
    // KPIs topo
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem">'+
    '<div style="flex:1;min-width:140px;background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem;border-left:4px solid #1a237e">'+

  var tecs=await _tecsLoad();

  var cfgDesc=(await _cfgGet('cfg_descontos'))||{pct_nps:0.01,pct_treinamento:0.005};

  // Espelha cadastro de técnicos, filtrando pela unidade selecionada
  var lista=Object.values(tecs).filter(function(t){
    if(!t.cod_mec||t.ativo===false) return false;
    if(!OFI.rev||OFI.rev===0) return true;
    var revKeys=Object.keys(t.revendas||{});
    return revKeys.indexOf(String(OFI.rev))>=0||revKeys.map(Number).indexOf(OFI.rev)>=0;
  }).sort(function(a,b){return a.nome.localeCompare(b.nome);});

      '<td><input type="number" step="0.1" value="'+(d.nps_anual!=null?d.nps_anual:'')+'" placeholder="—" style="width:80px;padding:4px 6px;border:1px solid #ddd;border-radius:4px" onchange="_npsSetCampo(\''+H(t.cod_mec)+'\',\'nps_anual\',this.value)"/></td>'+
      '<td style="text-align:center"><input type="checkbox" '+marcado+' onchange="_npsSetCampo(\''+H(t.cod_mec)+'\',\'desconto\',this.checked)" style="width:18px;height:18px;cursor:pointer"/></td>'+
      '<td class="num" style="color:'+(d.desconto?'#c62828':'#aaa')+'">'+(d.desconto?'-'+(cfgDesc.pct_nps*100).toFixed(2)+'%':'—')+'</td>'+

    '<div class="tw"><table><thead><tr><th>Técnico</th><th>NPS Mensal</th><th>NPS Anual</th><th>Aplicar desconto</th><th>Desconto</th></tr></thead>'+

    (!lista.length?'<div class="ainfo" style="margin-top:10px">Nenhum técnico cadastrado para esta unidade.</div>':'')+
    '</div>';
}

async function _npsSetCampo(codMec,campo,valor){
  var npsTecs=(await _cfgGet('cfg_nps_tecs'))||{};
  if(!npsTecs[codMec]) npsTecs[codMec]={};
  if(campo==='desconto') npsTecs[codMec][campo]=!!valor;
  else npsTecs[codMec][campo]=valor===''?null:+valor;
  await _cfgSet('cfg_nps_tecs',npsTecs);
  if(campo==='desconto') loadDescNps();
}

async function loadAgregados(){
  var el=document.getElementById('agg-content'); if(!el) return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  await _cfgGet('cfg_periodo');
  var per=_periodoComOffset(_comOffset);
  var sel=document.getElementById('agg-per-sel');
  if(sel) sel.value=String(_comOffset);

  var rows=[], from=0, more=true;
  while(more){
    var {data:d2,error:e2}=await _supa.from('oficina_os')
      .select('*').eq('revenda',OFI.rev)
      .gte('data_os',per.dtIni).lte('data_os',per.dtFim)
      .range(from,from+899);
    if(e2){el.innerHTML='<div class="aerr">Erro: '+e2.message+'</div>';return;}
    rows=rows.concat(d2||[]);
    if((d2||[]).length<900) more=false; else from+=900;
  }

  if(!rows.length){
    el.innerHTML='<div style="text-align:center;padding:3rem;color:#aaa">'+
      '<p>Nenhum dado para '+rn(OFI.rev)+' no período '+per.label+'</p></div>';
    return;
  }

  var tecs=await _tecsLoad();
  var cfgOf=_cfgOfiData||{};
  var agg10=(cfgOf.agg10||CFG_OFICINA_DEFAULTS.agg10||[]);
  var agg4 =(cfgOf.agg4 ||CFG_OFICINA_DEFAULTS.agg4 ||[]);
  var i100 =(cfgOf.itens100||CFG_OFICINA_DEFAULTS.itens100||[]);
  var m10={},m4={},mi100=new Set();
  agg10.forEach(function(a){m10[a.cod]=1;(a.alts||[]).forEach(function(x){m10[x]=1;});});
  agg4.forEach(function(a){m4[a.cod]=1; (a.alts||[]).forEach(function(x){m4[x]=1;});});
  i100.forEach(function(a){mi100.add(a.cod);});

  // Por técnico cadastrado
  var mecMap={};
  Object.values(tecs).filter(function(t){return t.cod_mec&&t.ativo!==false;}).forEach(function(t){
    mecMap[t.cod_mec]={nome:t.nome,fatAgg10:0,fatAgg4:0,qtd100:0,osU:{}};
  });
  var pRows=rows.filter(function(r){return r.tipo_item==='P';});
  pRows.forEach(function(r){
    var cod=r.mecanico, it=(r.item||'').toUpperCase(), v=+r.vlr_item||0;
    if(!mecMap[cod]) return;
    mecMap[cod].osU[r.nro_os]=1;
    if(m10[it]) mecMap[cod].fatAgg10+=v;
    if(m4[it])  mecMap[cod].fatAgg4+=v;
    if(mi100.has(it)) mecMap[cod].qtd100++;
  });

  var escAgg10=(cfgOf.escala_agg10||CFG_OFICINA_DEFAULTS.escala_agg10||[]);
  function calcPctAgg10(v){ var f=escAgg10.find(function(e){return v>=e.min&&v<=e.max;}); return f?f.pct:0; }
  var escAgg4_2=(cfgOf.escala_agg4||CFG_OFICINA_DEFAULTS.escala_agg4||[]);
  function calcPctAgg4(v){ var f=escAgg4_2.find(function(e){return v>=e.min&&v<=e.max;}); return f?f.pct:0.04; }

  var totA10=0,totA4=0,tot100=0;
  var linhas=Object.values(mecMap).filter(function(m){return m.fatAgg10>0||m.fatAgg4>0||m.qtd100>0;})
    .sort(function(a,b){return (b.fatAgg10+b.fatAgg4)-(a.fatAgg10+a.fatAgg4);})
    .map(function(m){
      var pct10=calcPctAgg10(m.fatAgg10);
      var pct4=calcPctAgg4(m.fatAgg4);
      var com10=m.fatAgg10*pct10, com4=m.fatAgg4*pct4;
      var com100=m.qtd100>=100?120:m.qtd100>=80?100:m.qtd100>=60?80:m.qtd100>=40?60:0;
      totA10+=com10; totA4+=com4; tot100+=com100;
      return'<tr>'+
        '<td><strong>'+H(m.nome)+'</strong></td>'+
        '<td class="num">'+fmt(m.fatAgg10)+'</td>'+
        '<td class="num" style="color:#6a1b9a">'+(pct10*100).toFixed(0)+'%</td>'+
        '<td class="num" style="font-weight:700;color:#6a1b9a">'+fmt(com10)+'</td>'+
        '<td class="num">'+fmt(m.fatAgg4)+'</td>'+
        '<td class="num" style="font-weight:700;color:#00695c">'+fmt(com4)+'</td>'+
        '<td class="num">'+m.qtd100+'</td>'+
        '<td class="num" style="font-weight:700;color:#e65100">'+fmt(com100)+'</td>'+
        '</tr>';
    }).join('');

  // Top 10 itens agregados
  var itensMap={};
  pRows.forEach(function(r){
    var it=(r.item||'').toUpperCase(), v=+r.vlr_item||0;
    if(!m10[it]&&!m4[it]) return;
    if(!itensMap[it]) itensMap[it]={cod:it,tipo:m10[it]?'10%':'4%',fat:0,qtd:0};
    itensMap[it].fat+=v; itensMap[it].qtd+=+r.quantidade||1;
  });
  var topItens=Object.values(itensMap).sort(function(a,b){return b.fat-a.fat;}).slice(0,15);
  var itensHtml=topItens.map(function(it){
    return'<tr><td><code>'+H(it.cod)+'</code></td>'+
      '<td><span class="badge" style="background:'+(it.tipo==='10%'?'#f3e5f5':'#e0f2f1')+';color:'+(it.tipo==='10%'?'#6a1b9a':'#00695c')+'">'+it.tipo+'</span></td>'+
      '<td class="num">'+fmtN(it.qtd)+'</td>'+
      '<td class="num" style="font-weight:700">'+fmt(it.fat)+'</td></tr>';
  }).join('');

  el.innerHTML=
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem">'+
    '<div style="flex:1;min-width:130px;background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem;border-left:4px solid #6a1b9a">'+
    '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase">Comissão Agg 10%</div>'+
    '<div style="font-size:18px;font-weight:700;color:#6a1b9a">'+fmt(totA10)+'</div></div>'+
    '<div style="flex:1;min-width:130px;background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem;border-left:4px solid #00695c">'+
    '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase">Comissão Agg 4%</div>'+
    '<div style="font-size:18px;font-weight:700;color:#00695c">'+fmt(totA4)+'</div></div>'+
